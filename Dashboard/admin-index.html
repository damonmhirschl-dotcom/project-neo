const USER_LABELS = {
  '76829264-20e1-7023-1e31-37b7a37a1274': 'balanced',
  'd6c272e4-a031-7053-af8e-ade000f0d0d5': 'aggressive',
  'e61202e4-30d1-70f8-9927-30b8a439e042': 'conservative',
};

function ProposalCard({ p, working, onApprove, onReject }) {
  const [showReasoning, setShowReasoning] = React.useState(false);
  const dirSymbol = p.direction === 'increase' ? '↑' : p.direction === 'decrease' ? '↓' : '→';
  const dirClass  = p.direction === 'increase' ? 'up' : p.direction === 'decrease' ? 'down' : '';
  const userLabel = p.user_id === 'all' ? 'all users' : (USER_LABELS[p.user_id] || p.user_id?.slice(0,8));
  const fmt = v => v != null ? Number(v).toFixed(4).replace(/\.?0+$/, '') : '—';
  const confidence = p.confidence ? p.confidence.toUpperCase() : null;
  const confColor  = confidence === 'HIGH' ? 'var(--green)' : confidence === 'MEDIUM' ? 'var(--amber)' : 'var(--text-3)';

  return (
    <div className="proposal-card">
      <div className="proposal-card-header">
        <span className="proposal-type-tag">{(p.proposal_type||'').replace(/_/g,' ')}</span>
        <span className="proposal-param">{p.parameter}</span>
        {confidence && <span style={{fontSize:'0.65rem',fontWeight:600,color:confColor}}>{confidence}</span>}
        <span className="proposal-user">{p.instrument ? `${p.instrument} · ` : ''}{userLabel}</span>
      </div>

      <div className="proposal-values">
        <span className="proposal-val-cur">{fmt(p.current_value)}</span>
        <em className={`proposal-arrow ${dirClass}`}>{dirSymbol}</em>
        <span className="proposal-val-new">{fmt(p.proposed_value)}</span>
      </div>

      {(p.n_trades || p.metric) && (
        <div className="proposal-basis">
          {p.n_trades ? `Based on ${p.n_trades} trades` : ''}
          {p.metric && p.metric_value != null ? ` · ${p.metric}: ${Number(p.metric_value).toFixed(3)}` : ''}
        </div>
      )}

      {p.reasoning && (
        <div>
          <button onClick={() => setShowReasoning(s => !s)}
            style={{fontSize:'0.7rem',color:'var(--text-3)',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:'0.25rem'}}>
            {showReasoning ? 'Hide reasoning ▲' : 'Show reasoning ▼'}
          </button>
          {showReasoning && <div className="proposal-reasoning">{p.reasoning}</div>}
        </div>
      )}

      {p.status === 'pending' && (
        <div className="proposal-actions">
          <button className="btn-approve" disabled={working} onClick={() => onApprove(p.id)}>Approve</button>
          <button className="btn-reject"  disabled={working} onClick={() => onReject(p.id)}>Reject</button>
        </div>
      )}

      {p.status !== 'pending' && (
        <div className="proposal-actioned">
          {p.status === 'approved' && `Approved by ${p.approved_by || '—'} · ${p.approved_at ? new Date(p.approved_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC' : ''}`}
          {p.status === 'rejected' && `Rejected by ${p.rejected_by || '—'} · ${p.rejected_at ? new Date(p.rejected_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC' : ''}`}
        </div>
      )}
    </div>
  );
}

function ProposalsPanel({ proposals, filter, setFilter, working, onApprove, onReject }) {
  const all      = proposals.proposals || [];
  const counts   = { all: all.length, pending: 0, approved: 0, rejected: 0 };
  all.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });

  const filtered = filter === 'all' ? all : all.filter(p => p.status === filter);

  return (
    <div className="card">
      <div className="sec-label">Learning Proposals</div>

      <div className="proposal-filter-bar">
        {['pending','approved','rejected','all'].map(f => (
          <button key={f} className={`proposal-filter-btn ${filter===f?'active':''}`} onClick={() => setFilter(f)}>
            {f.charAt(0).toUpperCase()+f.slice(1)}{counts[f] > 0 ? ` (${counts[f]})` : ''}
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <strong>No {filter === 'all' ? '' : filter+' '}proposals</strong>
          {filter === 'pending' && (
            <p className="muted">The learning module will generate proposals as trade data accumulates.</p>
          )}
          {filter !== 'pending' && filter !== 'all' && (
            <p className="muted">None in this category yet.</p>
          )}
          {filter === 'all' && (
            <p className="muted">No proposals have been generated yet.</p>
          )}
        </div>
      ) : (
        filtered.map(p => (
          <ProposalCard key={p.id} p={p} working={working} onApprove={onApprove} onReject={onReject} />
        ))
      )}
    </div>
  );
}

const USER_PROFILES_CE = {
  'e61202e4-20e1-7023-1e31-37b7a37a1274': 'Conservative',
  '76829264-20e1-7023-1e31-37b7a37a1274': 'Balanced',
  'd6c272e4-20e1-7023-1e31-37b7a37a1274': 'Aggressive',
};

function CapitalEventsPanel({ apiBase, getToken }) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadErr, setLoadErr] = useState(null);

  const loadEvents = React.useCallback(async () => {
    setLoading(true); setLoadErr(null);
    try {
      const res = await fetch(`${apiBase}/capital-events`, {
        headers: { 'Authorization': `Bearer ${getToken()}` }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setEvents(json.capital_events || []);
    } catch(e) {
      setLoadErr('Failed to load events: ' + e.message);
    } finally {
      setLoading(false);
    }
  }, [apiBase, getToken]);

  useEffect(() => { loadEvents(); }, [loadEvents]);

  const fmt = (n) => n == null ? '\u2014' : Number(n).toLocaleString('en-GB', {minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtDt = (s) => {
    if (!s) return '\u2014';
    const d = new Date(s);
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  };

  // Latest event timestamp as proxy for "last checked"
  const latestEvTime = events.length > 0
    ? fmtDt(events[0].event_time)
    : 'No data yet';

  return (
    <div>
      {/* ── Auto-detection summary ── */}
      <div className="sec-label" style={{marginBottom:'0.6rem'}}>Capital Baseline &amp; Auto-Detection</div>
      <div className="card" style={{marginBottom:'1.25rem'}}>

              </tbody>

          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState(() => {
    const t = getToken();
    if (CONFIG.MOCK_MODE) return 'authed';
    return t && isTokenValid(t) ? 'authed' : 'login';
  });

  // Dismiss loading overlay as soon as React has mounted — covers both login and dashboard paths.
  // Dashboard.refresh() will also try to dismiss it, but this ensures it clears even when
  // the login screen is shown (token expired / not authenticated).
  useEffect(() => {
    const overlay = document.getElementById('app-loading');
    if (overlay) { overlay.classList.add('fade-out'); setTimeout(() => overlay.remove(), 300); }
  }, []);

  return auth === 'login'
    ? <LoginScreen onLogin={() => setAuth('authed')} />
    : <Dashboard onLogout={() => { stopInactivityTimer(); clearAuth(); setAuth('login'); }} />;
}

// Exports orchestrator decision data: one row per pair per cycle.
// Pulls from decisions[] returned by /signals API (sourced from agent_signals,
// convergence_history, signal_persistence, and the orchestrator payload).
function downloadDecisionsCsv(decisions) {
  if (!decisions || !decisions.length) { alert('No decision data loaded yet. Decisions populate after the first orchestrator cycle.'); return; }

  // CSV helpers
  const q = v => {
    if (v === null || v === undefined) return '""';
    const str = String(v).replace(/\r\n|\n|\r/g, ' | ').replace(/"/g, '""');
    return `"${str}"`;
  };
  const n = v => (v !== null && v !== undefined && v !== '') ? v : '';
  const f = (v, dp=4) => (v !== null && v !== undefined && v !== '') ? Number(v).toFixed(dp) : '';
  const b = v => v === true ? 'YES' : v === false ? 'NO' : '';

  const headers = [
    // ── Identity
    'cycle_time_utc',
    'cycle_number',
    'user_id',
    'pair',

    // ── Outcome
    'approved',
    'rejection_reasons',

    // ── Directional gate (NEW)
    'directional_gate',
    'directional_direction',

    // ── Convergence
    'final_convergence',
    'base_convergence',
    'effective_threshold',
    'bias',
    'confidence',

    // ── Historical bonuses (NEW — from signal_persistence + convergence_history)
    'persistence_bonus',
    'trend_modifier',
    'trend_state',
    'pattern_bonus',
    'total_historical_bonus',

    // ── Per-agent scores
    'macro_score',
    'macro_confidence',
    'macro_bias',
    'macro_persistence_cycles',
    'technical_score',
    'technical_confidence',
    'technical_bias',
    'technical_persistence_cycles',
    'regime_score',
    'regime_confidence',

    // ── Market context
    'stress_score',
    'stress_state',
    'current_session',
    'day_of_week',
    'open_positions',

    // ── Convergence trend (last 6 cycles, oldest → newest)
    'conv_history_6cycles',
  ];

  const rows = decisions.map(d => [
    // Identity
    q(d.cycle_time_utc),
    n(d.cycle_number),
    q(d.user_id),
    q(d.pair),

    // Outcome
    b(d.approved),
    q(d.rejection_reasons),

    // Directional gate
    q(d.directional_gate),
    q(d.directional_direction),

    // Convergence
    f(d.final_convergence),
    f(d.base_convergence),
    f(d.effective_threshold),
    q(d.bias),
    f(d.confidence, 4),

    // Historical bonuses
    f(d.persistence_bonus),
    f(d.trend_modifier),
    q(d.trend_state),
    f(d.pattern_bonus),
    f(d.total_historical_bonus),

    // Per-agent
    f(d.macro_score),
    f(d.macro_confidence, 4),
    q(d.macro_bias),
    n(d.macro_persistence_cycles),
    f(d.technical_score),
    f(d.technical_confidence, 4),
    q(d.technical_bias),
    n(d.technical_persistence_cycles),
    f(d.regime_score),
    f(d.regime_confidence, 4),

    // Market context
    f(d.stress_score, 1),
    q(d.stress_state),
    q(d.current_session),
    n(d.day_of_week),
    n(d.open_positions),

    // Conv history
    q(d.conv_history_6cycles),
  ].join(','));

  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const ts   = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  a.href     = url;
  a.download = `neo_decisions_${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}



function renderObsGrid(signals, currentPairFilter) {
  // Pure function — returns HTML string, no DOM manipulation
  let filtered = currentPairFilter
    ? signals.filter(s => s.instrument===currentPairFilter || s.instrument===null)
    : signals;

  if (!filtered || !filtered.length) {
    return '<div class="empty-state"><strong>No signals</strong><br/>No agent signals for this pair combination.</div>';
  }

  // Group into 15-minute buckets so agents that run at slightly different times
  // within the same trading cycle appear together in one group.
  // De-dup within each bucket: keep the latest signal per (agent, instrument, user).
  function bucket15(isoStr) {
    const d = new Date(isoStr);
    d.setMinutes(Math.floor(d.getMinutes() / 15) * 15, 0, 0);
    return d.toISOString();
  }
  const cycleMap = {};
  filtered.forEach(s => {
    const bk = s.created_at ? bucket15(s.created_at) : 'unknown';
    if (!cycleMap[bk]) cycleMap[bk] = {};
    const dk = `${s.agent_name}|${s.instrument===null?'__null__':s.instrument}|${s.user_id||''}`;
    if (!cycleMap[bk][dk] || new Date(s.created_at) > new Date(cycleMap[bk][dk].created_at)) {
      cycleMap[bk][dk] = s;
    }
  });

  const order = ['macro','technical','regime','risk_guardian','orchestrator'];
  const cycles = Object.keys(cycleMap).sort((a,b)=>new Date(b)-new Date(a));

  return cycles.map((bk, ci) => {
    const bucketSignals = Object.values(cycleMap[bk]);
    // Use the timestamp of the most recent signal in this bucket for the header
    const latestMs = Math.max(...bucketSignals.map(s => new Date(s.created_at).getTime()));
    const t = new Date(latestMs);
    const isLatest = ci === 0;
    const minsAgo = Math.round((Date.now() - latestMs) / 60000);
    const label = isLatest ? 'Latest cycle' : `${minsAgo} min ago`;

    // Group cards by pair within this cycle so 20×4 cards are navigable
    const PAIR_ORDER_OBS = [
      'EURUSD','GBPUSD','USDJPY','USDCHF','AUDUSD','USDCAD','NZDUSD',
      'EURGBP','EURJPY','GBPJPY','EURCHF','GBPCHF','EURAUD','GBPAUD',
      'EURCAD','GBPCAD','AUDNZD','AUDJPY','CADJPY','NZDJPY',
    ];
    const byPair = {};
    bucketSignals.forEach(s => {
      const key = s.instrument || '__global__';
      if (!byPair[key]) byPair[key] = [];
      byPair[key].push(s);
    });
    const pairKeys = [
      ...PAIR_ORDER_OBS.filter(p => byPair[p]),
      ...Object.keys(byPair).filter(k => k !== '__global__' && !PAIR_ORDER_OBS.includes(k)),
      ...(byPair['__global__'] ? ['__global__'] : []),
    ];
    const pairGroupsHtml = pairKeys.map(pk => {
      const pairSignals = byPair[pk].sort((a,b) => {
        const ai=order.indexOf(a.agent_name), bi=order.indexOf(b.agent_name);
        return (ai<0?99:ai)-(bi<0?99:bi);
      });
      const pairLabel = pk === '__global__' ? 'Global' : pk.slice(0,3)+'/'+pk.slice(3);
      return `<div class="obs-pair-group">
        <div class="obs-pair-header">${pairLabel}</div>
        ${pairSignals.map(renderCard).join('')}
      </div>`;
    }).join('');

    return `
      <div class="obs-cycle-group">
        <div class="obs-cycle-group-header">
          <span class="obs-cycle-group-time">${fmtFull(t)} UTC</span>
          <span class="obs-cycle-group-label">${label}</span>
          ${isLatest ? '<div class="obs-cycle-dot"></div>' : ''}
        </div>
        ${pairGroupsHtml}
      </div>`;
  }).join('');
}

function renderCard(s) {
  const cfg = AGENT_CFG[s.agent_name] || {color:'#6B7280', label:s.agent_name};
  const p   = s.payload || {};
  const score = s.score;
  const bias  = s.bias || 'neutral';
  const conf  = s.confidence || 0;
  const id    = `card_${s.agent_name}_${s.instrument||'global'}_${new Date(s.created_at).getTime()}`;

  const barPct = score!==null ? Math.min(Math.abs(score)*50,50) : 0;
  const barDir = score>0 ? 'fill-pos' : 'fill-neg';
  const scoreStr = score===null ? '—' : (score>0 ? `+${score.toFixed(2)}` : score.toFixed(2));
  const scoreClass = score>0 ? 'pos' : score<0 ? 'neg' : 'neut';
  const biasClass = bias==='bullish' ? 'bias-bull' : bias==='bearish' ? 'bias-bear' : 'bias-neut';

  // Decision badge
  let decHtml = '';
  if (p.decision) {
    const dc = p.decision==='APPROVED'||p.decision==='EXECUTE' ? 'decision-approve' : 'decision-reject';
    const dc2 = p.decision==='EXECUTE' ? 'decision-execute' : dc;
    decHtml = `<span class="decision-badge ${dc2}">${p.decision}</span>`;
  }

  // Pre-event banner
  const preEventHtml = p.pre_event_active
    ? `<div class="pre-event-banner">⚠ Pre-event protocol active — ${p.pre_event_reason||'position size reduced'}</div>`
    : '';

  // Reasoning
  const reasoningHtml = p.reasoning
    ? `<div class="inner-section"><div class="inner-label">Reasoning</div><div class="reasoning-text">${esc(p.reasoning)}</div></div>`
    : '';

  // Key factors
  let factorsHtml = '';
  if (p.key_factors) {
    const rows = Object.entries(p.key_factors).slice(0,6).map(([k,v]) => {
      const val = typeof v==='object' ? v.value : v;
      const vs = typeof val==='number' ? val.toFixed(2) : String(val);
      const vc = vs.includes('-')||vs.toLowerCase().includes('weak')||vs.toLowerCase().includes('bear')||vs.toLowerCase().includes('dovish') ? 'neg'
               : vs.toLowerCase().includes('bull')||vs.toLowerCase().includes('hawk')||vs.toLowerCase().includes('strong') ? 'pos'
               : 'neut';
      return `<div class="factor-row"><span class="factor-name">${k.replace(/_/g,' ')}</span><span class="factor-val ${vc}">${vs}</span></div>`;
    }).join('');
    factorsHtml = `<div class="inner-section"><div class="inner-label">Key Factors</div><div class="factors-grid">${rows}</div></div>`;
  }

  // Key levels
  let levelsHtml = '';
  if (p.key_levels) {
    const kl = p.key_levels;
    const items = [
      kl.current_price && `<div class="level-item"><span class="level-lbl">Price</span><span class="level-val">${kl.current_price}</span></div>`,
      kl.resistance_1  && `<div class="level-item"><span class="level-lbl">R1</span><span class="level-val neg">${kl.resistance_1}</span></div>`,
      kl.support_1     && `<div class="level-item"><span class="level-lbl">S1</span><span class="level-val pos">${kl.support_1}</span></div>`,
      kl.ema_200_1h    && `<div class="level-item"><span class="level-lbl">EMA 200</span><span class="level-val">${kl.ema_200_1h}</span></div>`,
    ].filter(Boolean);
    if (items.length) levelsHtml = `<div class="inner-section"><div class="inner-label">Key Levels</div><div class="levels-row">${items.join('')}</div></div>`;
  }

  // Convergence breakdown
  let convHtml = '';
  if (p.signal_scores) {
    const rows = Object.entries(p.signal_scores).map(([agent,d]) => {
      const pct = Math.min(Math.abs(d.score)*50,50);
      const fc = d.score>=0 ? 'conv-fill-pos' : 'conv-fill-neg';
      const sc = d.score>=0 ? 'pos' : 'neg';
      return `<div class="conv-row">
        <span class="conv-agent">${agent}</span>
        <div class="conv-track"><div class="conv-fill ${fc}" style="width:${pct}%"></div></div>
        <span class="conv-score ${sc}">${d.score>0?'+':''}${d.score.toFixed(2)}</span>
        <span class="conv-weight">${(d.weight*100).toFixed(0)}%</span>
      </div>`;
    }).join('');
    convHtml = `<div class="inner-section"><div class="inner-label">Convergence Breakdown</div><div class="conv-breakdown">${rows}</div></div>`;
  }

  // Upcoming events
  let eventsHtml = '';
  if (p.upcoming_events && p.upcoming_events.length) {
    const rows = p.upcoming_events.map(e =>
      `<div class="event-row"><span class="event-time">${e.time}</span><span class="event-name">${e.indicator}</span><span class="event-fcst">fcst ${e.forecast}</span></div>`
    ).join('');
    eventsHtml = `<div class="inner-section"><div class="inner-label">Upcoming Tier-1 Events</div>${rows}</div>`;
  }

  const rawId = `raw_${id}`;

  return `
    <div class="obs-card" id="${id}">
      <div class="obs-card-header" data-card-id="${id}">
        <div class="agent-name-row">
          <div class="agent-dot" style="background:${cfg.color}"></div>
          <span class="agent-name">${cfg.label}</span>
          ${s.instrument ? `<span class="agent-instrument">/ ${s.instrument}</span>` : ''}
          ${decHtml}
        </div>
        <div class="card-meta-row">
          ${score!==null ? `<span class="bias-badge ${biasClass}">${bias}</span>` : ''}
          <span class="score-val ${scoreClass}">${scoreStr}</span>
          <span class="expand-chevron">▼</span>
        </div>
      </div>

      ${score!==null ? `
      <div class="score-bar-row">
        <span class="score-bar-label">−1.0</span>
        <div class="score-bar-track">
          <div class="score-bar-mid"></div>
          <div class="score-bar-fill ${barDir}" style="width:${barPct}%"></div>
        </div>
        <span class="score-bar-label">+1.0</span>
      </div>` : ''}

      <div class="obs-card-body">
        ${preEventHtml}
        ${reasoningHtml}
        ${factorsHtml}
        ${levelsHtml}
        ${convHtml}
        ${eventsHtml}
        <div class="obs-card-footer">
          <span class="footer-ts">${fmtFull(new Date(s.created_at))} UTC</span>
          <div class="footer-right">
            <button class="raw-toggle-btn" data-raw-id="${rawId}">Raw payload</button>
            <div class="conf-row">
              <span class="conf-label">Conf</span>
              <div class="conf-track"><div class="conf-fill" style="width:${conf*100}%"></div></div>
              <span class="conf-val">${(conf*100).toFixed(0)}%</span>
            </div>
          </div>
        </div>
        <div class="raw-payload" id="${rawId}">
          <pre>${esc(JSON.stringify(p,null,2))}</pre>
        </div>
      </div>
    </div>`;
}



function fmt(d) { return d.toTimeString().slice(0,5); }
function fmtFull(d) { return d.toISOString().replace('T',' ').slice(0,19); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function ObservationPanel({ signals, loading, pairFilter, onPairFilter, onDownload }) {
  if (loading) return React.createElement('div', {style:{color:'#aaa',padding:'1rem',textAlign:'center'}}, 'Loading signals…');

function SystemEquityCurvePanel({ apiBase, getToken }) {
  const { useState, useEffect, useRef, useCallback } = React;
  const [period, setPeriod]       = useState('1W');
  const [profileData, setData]    = useState({});
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState(null);
  const equityRef = useRef(null);
  const ddRef     = useRef(null);
  const equityChartRef = useRef(null);
  const ddChartRef     = useRef(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const results = await Promise.all(
        EQUITY_PROFILES.map(p =>
          fetch(`${apiBase}/equity-curve?user_id=${encodeURIComponent(p.id)}&period=${period}`,
            { headers: { 'Authorization': `Bearer ${getToken()}` } })
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        )
      );
      const d = {};
      EQUITY_PROFILES.forEach((p, i) => { d[p.id] = results[i]; });
      setData(d);
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  }, [period, apiBase, getToken]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (!equityRef.current || !ddRef.current) return;
    if (Object.keys(profileData).length === 0) return;
    if (typeof Chart === 'undefined') return;

    if (equityChartRef.current) { equityChartRef.current.destroy(); equityChartRef.current = null; }
    if (ddChartRef.current)     { ddChartRef.current.destroy();     ddChartRef.current = null; }

    // Union of all timestamps, sorted
    const allTs = [...new Set(
      EQUITY_PROFILES.flatMap(p => (profileData[p.id]?.equity_curve || []).map(pt => pt.snapshot_time))
    )].sort();
    if (allTs.length === 0) return;

      const d = new Date(ts);

        plugins: {
          legend: { position: 'top', labels: { font: { family: "'DM Sans'", size: 11 }, color: tickColor, boxWidth: 12, padding: 16 } },
          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: £${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString('en-GB', {minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}` } }
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, maxTicksLimit: 8, maxRotation: 0 } },
          y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, callback: v => '£' + v.toLocaleString('en-GB') } }
        }
      }
    });

    // ── Chart 2: drawdown ─────────────────────────────────────────
    const ddDatasets = EQUITY_PROFILES.map(p => {
      const curve = profileData[p.id]?.equity_curve || [];
      const byTs  = Object.fromEntries(curve.map(pt => [pt.snapshot_time, pt.drawdown_pct]));
      return {
        label: p.name,
        data: allTs.map(ts => { const v = byTs[ts]; return v != null ? -Math.abs(Number(v)) : null; }),
        borderColor: p.hex,
        backgroundColor: `rgba(${p.rgb},0.05)`,
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
        tension: 0.3, fill: false, spanGaps: true,
      };
    });
    // Reference lines at -5, -10, -15
    [-5, -10, -15].forEach(level => {
      ddDatasets.push({
        label: `${level}% ref`,
        data: allTs.map(() => level),
        borderColor: 'rgba(156,163,175,0.4)',
        borderWidth: 1, borderDash: [4, 4],
        pointRadius: 0, fill: false, spanGaps: true,
        tooltip: { enabled: false },
      });
    });

    ddChartRef.current = new Chart(ddRef.current, {
      type: 'line',
      data: { labels, datasets: ddDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            filter: item => !item.dataset.label.endsWith('ref'),
            callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : '—'}%` }
          }
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, maxTicksLimit: 8, maxRotation: 0 } },
          y: { grid: { color: gridColor }, max: 0, ticks: { color: tickColor, font: { size: 10 }, callback: v => v.toFixed(0) + '%' } }
        }
      }
    });
  }, [profileData]);

  const statsFor = id => {
    const curve = profileData[id]?.equity_curve || [];
    if (!curve.length) return { value: null, ret: null, dd: null };
    const latest = curve[curve.length - 1];
    const value  = Number(latest.account_value);
    const ret    = ((value - EQUITY_BASELINE) / EQUITY_BASELINE) * 100;
    const dd     = Number(latest.drawdown_pct || 0);
    return { value, ret, dd };
  };

  const fmtGbp  = n => n == null ? '—' : '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtPct  = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'1rem' }}>
        <div className="sec-label" style={{ marginBottom:0 }}>System Equity Curve — All Profiles</div>
        <div style={{ display:'flex', gap:'4px' }}>
          {['1W','1M','All'].map(p => (
            <button key={p} onClick={() => setPeriod(p)}
              style={{ fontSize:'0.72rem', fontWeight:500, padding:'3px 10px',
                borderRadius:'var(--radius-sm)', border:'1px solid var(--border-md)', cursor:'pointer',
                background: period===p ? 'var(--text-1)' : 'none',
                color: period===p ? 'var(--surface)' : 'var(--text-3)',
                transition:'background 0.15s,color 0.15s' }}>
              {p}
            </button>
          ))}
        </div>
      </div>

      {/* Summary stats row */}
      <div className="grid-3" style={{ marginBottom:'1.25rem' }}>
        {EQUITY_PROFILES.map(p => {
          const s = statsFor(p.id);
          const pos = s.ret != null && s.ret >= 0;
          return (
            <div key={p.id} className="stat-card" style={{ borderLeft:`3px solid ${p.hex}`, paddingLeft:'1rem' }}>
              <div className="lbl" style={{ color:p.hex, fontWeight:500 }}>{p.name}</div>
              <div className="val">{fmtGbp(s.value)}</div>
              <div className="sub" style={{ color: s.ret == null ? 'var(--text-3)' : pos ? 'var(--green)' : 'var(--red)' }}>
                {fmtPct(s.ret)} vs baseline
              </div>
              <div className="sub" style={{ color:'var(--text-3)', marginTop:2 }}>
                DD: {s.dd != null ? '-' + Math.abs(s.dd).toFixed(2) + '%' : '—'}
              </div>
            </div>
          );
        })}
      </div>

      {error   && <div style={{ color:'var(--red)', fontSize:'0.8rem', marginBottom:'1rem' }}>Error: {error}</div>}
      {loading && <div style={{ color:'var(--text-3)', fontSize:'0.8rem', marginBottom:'1rem' }}>Loading…</div>}

      {/* Chart 1 — multi-profile equity */}
      <div className="card" style={{ marginBottom:'1rem' }}>
        <div className="sec-label" style={{ marginBottom:'0.75rem' }}>Account Value (GBP)</div>
        <div style={{ position:'relative', height:'280px' }}>
          <canvas ref={equityRef}></canvas>
        </div>
      </div>

      {/* Chart 2 — drawdown comparison */}
      <div className="card">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.75rem' }}>
          <div className="sec-label" style={{ marginBottom:0 }}>Drawdown from Peak</div>
          <div style={{ display:'flex', gap:'1rem' }}>
            {EQUITY_PROFILES.map(p => (
              <span key={p.id} style={{ fontSize:'0.7rem', color:'var(--text-3)', display:'flex', alignItems:'center', gap:4 }}>
                <span style={{ display:'inline-block', width:10, height:2, background:p.hex, borderRadius:1 }}></span>
                {p.name}
              </span>
            ))}
          </div>
        </div>
        <div style={{ position:'relative', height:'200px' }}>
          <canvas ref={ddRef}></canvas>
        </div>
        <div style={{ display:'flex', gap:'1.5rem', marginTop:'0.6rem' }}>
          {['-5%', '-10%', '-15%'].map(l => (
            <span key={l} style={{ fontSize:'0.68rem', color:'var(--text-3)', display:'flex', alignItems:'center', gap:4 }}>
              <span style={{ display:'inline-block', width:16, height:0, borderTop:'1px dashed rgba(156,163,175,0.7)' }}></span>
              {l} ref
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
