<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Project Neo — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--panel:#111118;--panel2:#16161f;
  --border:#1e1e2e;--border2:#252535;
  --text1:#e8e8f0;--text2:#9090a8;--text3:#52526a;
  --green:#00d4aa;--green-dim:#00d4aa22;
  --red:#ff4757;--red-dim:#ff475722;
  --amber:#f59e0b;--amber-dim:#f59e0b22;
  --blue:#3b82f6;--blue-dim:#3b82f622;
  --purple:#a855f7;
  --mono:'JetBrains Mono',monospace;
  --sans:system-ui,-apple-system,sans-serif;
  --r:4px;
}
html,body{background:var(--bg);color:var(--text1);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh}
#app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
#app-loading.fade-out{opacity:0;pointer-events:none}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
.dash{max-width:1800px;margin:0 auto;padding:0 12px 24px}
.row{display:grid;gap:8px;margin-bottom:8px}
.row-3{grid-template-columns:repeat(3,1fr)}
.row-6040{grid-template-columns:60fr 40fr}
.row-1{grid-template-columns:1fr}

/* HEADER */
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:16px;margin-bottom:8px;position:sticky;top:0;z-index:100}
.header-logo{font-family:var(--mono);font-size:.85rem;font-weight:600;color:var(--text1);letter-spacing:.05em;white-space:nowrap}
.header-logo span{color:var(--green)}
.header-divider{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.header-center{display:flex;align-items:center;gap:16px;flex:1}
.header-stat{display:flex;flex-direction:column;gap:1px}
.header-stat .lbl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.header-stat .val{font-family:var(--mono);font-size:.82rem;font-weight:600;color:var(--text1)}
.header-stat .val.pos{color:var(--green)}
.header-stat .val.neg{color:var(--red)}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.ts{font-family:var(--mono);font-size:.65rem;color:var(--text3)}
.btn-refresh{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:.68rem;padding:4px 10px;cursor:pointer;border-radius:var(--r);transition:border-color .15s,color .15s}
.btn-refresh:hover{border-color:var(--green);color:var(--green)}
.session-badge{font-family:var(--mono);font-size:.65rem;font-weight:600;padding:3px 8px;border-radius:var(--r);text-transform:uppercase;letter-spacing:.06em}
.session-london{background:var(--blue-dim);color:var(--blue);border:1px solid #3b82f633}
.session-ny{background:#a855f722;color:var(--purple);border:1px solid #a855f733}
.session-asian{background:var(--amber-dim);color:var(--amber);border:1px solid #f59e0b33}
.session-off{background:var(--border);color:var(--text3);border:1px solid var(--border2)}
.stress-badge{font-family:var(--mono);font-size:.65rem;font-weight:600;padding:3px 8px;border-radius:var(--r);text-transform:uppercase;letter-spacing:.06em}
.stress-low{background:var(--green-dim);color:var(--green);border:1px solid #00d4aa33}
.stress-med{background:var(--amber-dim);color:var(--amber);border:1px solid #f59e0b33}
.stress-high{background:var(--red-dim);color:var(--red);border:1px solid #ff475733}

/* PANEL SHELL */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.panel-title{font-family:var(--mono);font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.panel-sub{font-size:.6rem;color:var(--text3)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0;color:var(--text3);font-size:.72rem;gap:4px}
.empty-state .em-icon{font-size:1.4rem;opacity:.4}

/* SECTION HEADER */
.sec-hdr{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:8px 0 4px;border-top:1px solid var(--border);margin-top:6px}
.sec-hdr.first{border-top:none;margin-top:0;padding-top:0}

/* CONVERGENCE */
.conv-hdr-row,.conv-row{display:grid;grid-template-columns:68px 1fr 52px 52px 46px;align-items:center;gap:6px;padding:3px 6px}
.conv-hdr-row{padding:2px 6px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.conv-hdr-cell{font-size:.57rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}
.conv-hdr-cell.r{text-align:right}
.conv-row{border-radius:var(--r);cursor:default}
.conv-row:hover{background:var(--panel2)}
.conv-pair{font-family:var(--mono);font-size:.72rem;font-weight:600}
.conv-bar-wrap{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.conv-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.bull-fill{background:var(--green)}
.bear-fill{background:var(--red)}
.neut-fill{background:var(--text3)}
.conv-score{font-family:var(--mono);font-size:.68rem;font-weight:600;text-align:right}
.bull{color:var(--green)}
.bear{color:var(--red)}
.neut{color:var(--text3)}
.conv-sub{font-family:var(--mono);font-size:.6rem;color:var(--text3);text-align:right}
.dir-badge{font-family:var(--mono);font-size:.57rem;font-weight:600;padding:2px 4px;border-radius:2px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.dir-bull{background:var(--green-dim);color:var(--green)}
.dir-bear{background:var(--red-dim);color:var(--red)}
.dir-neut{background:var(--border);color:var(--text3)}

/* CURRENCY STRENGTH */
.cs-row{display:grid;grid-template-columns:36px 1fr 56px 44px;align-items:center;gap:8px;padding:4px 0}
.cs-ccy{font-family:var(--mono);font-size:.78rem;font-weight:600}
.cs-bar-wrap{height:6px;background:var(--border2);border-radius:2px;overflow:hidden;position:relative}
.cs-bar-pos{height:100%;border-radius:0 2px 2px 0;background:var(--green);position:absolute;left:50%}
.cs-bar-neg{height:100%;border-radius:2px 0 0 2px;background:var(--red);position:absolute;right:50%}
.cs-center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border2)}
.cs-score{font-family:var(--mono);font-size:.7rem;font-weight:600;text-align:right}
.cs-bias{font-family:var(--mono);font-size:.58rem;font-weight:600;padding:2px 5px;border-radius:2px;text-align:center;text-transform:uppercase}
.cs-bull{background:var(--green-dim);color:var(--green)}
.cs-bear{background:var(--red-dim);color:var(--red)}
.cs-neut{background:var(--border);color:var(--text3)}

/* MACRO SIGNALS */
.macro-stat{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.macro-stat:last-child{border-bottom:none}
.macro-lbl{font-size:.68rem;color:var(--text2)}
.macro-val{font-family:var(--mono);font-size:.72rem;font-weight:600}
.macro-pair-row{display:grid;grid-template-columns:64px 54px 1fr;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border)}
.macro-pair-row:last-child{border-bottom:none}
.macro-pair{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.macro-mscore{font-family:var(--mono);font-size:.65rem;font-weight:600;text-align:center}
.macro-gate{font-family:var(--mono);font-size:.6rem;font-weight:600;text-align:right}
.gate-pass{color:var(--green)}
.gate-block{color:var(--red)}
.gate-warn{color:var(--amber)}
.gate-dim{color:var(--text3)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.68rem}
th{font-family:var(--mono);font-size:.57rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--panel2)}
.mono{font-family:var(--mono)}
.val-pos{color:var(--green);font-family:var(--mono);font-weight:600}
.val-neg{color:var(--red);font-family:var(--mono);font-weight:600}
.val-dim{color:var(--text2);font-family:var(--mono)}
.dir-long{color:var(--green);font-family:var(--mono);font-size:.65rem;font-weight:600}
.dir-short{color:var(--red);font-family:var(--mono);font-size:.65rem;font-weight:600}

/* PORTFOLIO EXPOSURE */
.exp-profile{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.exp-profile:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.exp-name{font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:6px}
.exp-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.exp-bar-lbl{font-size:.6rem;color:var(--text3);width:80px;flex-shrink:0}
.exp-bar-outer{flex:1;height:6px;background:var(--border2);border-radius:2px;overflow:hidden}
.exp-bar-inner{height:100%;border-radius:2px;transition:width .3s}
.exp-bar-val{font-family:var(--mono);font-size:.62rem;color:var(--text2);width:60px;text-align:right;flex-shrink:0}
.exp-warn{background:var(--amber-dim);border:1px solid #f59e0b33;border-radius:var(--r);padding:4px 8px;font-size:.62rem;color:var(--amber);margin-top:6px}

/* TECHNICAL */
.tech-hdr-row,.tech-row{display:grid;grid-template-columns:64px 48px 36px 1fr 56px;align-items:center;gap:6px;padding:3px 6px}
.tech-hdr-row{padding:2px 6px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.tech-hdr-cell{font-size:.57rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}
.tech-row{border-radius:var(--r)}
.tech-row:hover{background:var(--panel2)}
.tech-pair{font-family:var(--mono);font-size:.68rem;font-weight:600;color:var(--text2)}
.tech-val{font-family:var(--mono);font-size:.65rem;font-weight:600;text-align:center}
.regime-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.regime-fill{height:100%;border-radius:2px}
.fill-trending{background:var(--blue)}
.fill-ranging{background:var(--amber)}
.fill-high_volatility{background:var(--red)}
.fill-low_volatility{background:var(--green)}
.fill-{background:var(--text3)}

/* LEARNING */
.acc-row{display:grid;grid-template-columns:80px 1fr 36px;align-items:center;gap:8px;padding:4px 0}
.acc-lbl{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.acc-bar-wrap{height:5px;background:var(--border2);border-radius:2px;overflow:hidden}
.acc-bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.acc-val{font-family:var(--mono);font-size:.65rem;font-weight:600;text-align:right}
.lstat{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}
.lstat:last-child{border-bottom:none}
.lstat-lbl{font-size:.65rem;color:var(--text2)}
.lstat-val{font-family:var(--mono);font-size:.72rem;font-weight:600}
.proposal-box{background:var(--amber-dim);border:1px solid #f59e0b33;border-radius:var(--r);padding:8px;margin-top:8px}
.proposal-ttl{font-family:var(--mono);font-size:.62rem;font-weight:600;color:var(--amber);margin-bottom:3px}
.proposal-body{font-size:.62rem;color:var(--amber);opacity:.8;line-height:1.5}

/* REGIME & STRESS */
.gauge-wrap{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.gauge-bar{flex:1;height:8px;background:var(--border2);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;transition:width .3s}
.gauge-low{background:var(--green)}
.gauge-med{background:var(--amber)}
.gauge-high{background:var(--red)}
.gauge-lbl{font-family:var(--mono);font-size:.72rem;font-weight:600;min-width:36px}
.stress-comp-row{display:grid;grid-template-columns:110px 1fr 48px;align-items:center;gap:6px;padding:3px 0}
.stress-comp-lbl{font-size:.62rem;color:var(--text3)}
.stress-comp-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.stress-comp-fill{height:100%;border-radius:2px;background:var(--amber)}
.stress-comp-val{font-family:var(--mono);font-size:.62rem;color:var(--text2);text-align:right}
.regime-pair-row{display:grid;grid-template-columns:64px 1fr 70px;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--border)}
.regime-pair-row:last-child{border-bottom:none}
.regime-pair{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.regime-val{font-family:var(--mono);font-size:.62rem;font-weight:600;text-align:right}
.r-trending{color:var(--blue)}
.r-ranging{color:var(--amber)}
.r-high_volatility{color:var(--red)}
.r-low_volatility{color:var(--green)}

/* TRADES */
.conv-tag{font-family:var(--mono);font-size:.62rem;padding:1px 5px;border-radius:2px;background:var(--border);color:var(--text2)}
.exit-reason{font-size:.62rem;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis}

/* LOGIN */
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:340px;display:flex;flex-direction:column;gap:16px}
.login-title{font-family:var(--mono);font-size:1rem;font-weight:600;color:var(--text1)}
.login-sub{font-size:.72rem;color:var(--text3);line-height:1.5}
.login-field{display:flex;flex-direction:column;gap:5px}
.login-field label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
.login-field input{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text1);font-family:var(--mono);font-size:.82rem;padding:8px 10px;outline:none;transition:border-color .15s;width:100%}
.login-field input:focus{border-color:var(--green)}
.login-btn{background:var(--green);color:#000;font-family:var(--mono);font-size:.78rem;font-weight:600;border:none;border-radius:var(--r);padding:10px;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
.login-err{font-size:.68rem;color:var(--red);font-family:var(--mono)}
.qr-img{width:100%;border-radius:var(--r)}

/* SESSION WARNING */
#neo-session-warning{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--amber);color:#000;padding:8px 16px;align-items:center;justify-content:space-between;font-size:.8rem;font-weight:500;gap:12px}
.warn-dismiss{background:rgba(0,0,0,.15);border:none;cursor:pointer;padding:3px 10px;border-radius:var(--r);font-weight:600;font-size:.75rem}

/* TAB NAV */
.tab-nav{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px;overflow-x:auto;scrollbar-width:none;white-space:nowrap}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{font-family:var(--mono);font-size:.68rem;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px 8px;cursor:pointer;transition:color .15s;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;letter-spacing:.04em}
.tab-btn:hover{color:var(--text1)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* AUDIT LOG */
.audit-row{display:grid;grid-template-columns:80px 1fr 56px;align-items:start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.audit-row:last-child{border-bottom:none}
.audit-time{font-family:var(--mono);font-size:.65rem;color:var(--text3);white-space:nowrap}
.audit-event{font-size:.68rem;color:var(--text2);line-height:1.4}
.audit-tag{font-family:var(--mono);font-size:.57rem;font-weight:600;padding:2px 5px;border-radius:2px;text-align:center;text-transform:uppercase}
.tag-signal{background:var(--blue-dim);color:var(--blue)}
.tag-trade{background:var(--green-dim);color:var(--green)}
.tag-risk{background:var(--red-dim);color:var(--red)}
.tag-system{background:var(--border);color:var(--text2)}

/* OBSERVATION */
.obs-pair-section{margin-bottom:12px}
.obs-pair-hdr{font-family:var(--mono);font-size:.72rem;font-weight:600;color:var(--text1);padding:6px 8px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.obs-pair-hdr:hover{border-color:var(--border2)}
.obs-agent-row{padding:6px 10px;border-left:1px solid var(--border);margin-left:8px;border-bottom:1px solid var(--border)}
.obs-agent-row:last-child{border-bottom:none}
.obs-agent-name{font-family:var(--mono);font-size:.65rem;font-weight:600;color:var(--text2);text-transform:capitalize;width:80px;flex-shrink:0}
.obs-signal-detail{font-size:.65rem;color:var(--text2);line-height:1.5;flex:1}
.obs-signal-meta{font-family:var(--mono);font-size:.6rem;color:var(--text3);white-space:nowrap}
.obs-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.obs-chip{font-family:var(--mono);font-size:.62rem;color:var(--text3);background:var(--panel);border:1px solid var(--border2);padding:3px 8px;border-radius:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.obs-chip:hover{color:var(--text1);border-color:var(--text3)}
.obs-chip.active{background:var(--text1);color:var(--bg);border-color:var(--text1)}

/* UTILS */
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-dim{color:var(--text3)}
.mono-sm{font-family:var(--mono);font-size:.65rem}
.dl-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:.65rem;padding:4px 10px;cursor:pointer;border-radius:var(--r);transition:border-color .15s,color .15s;margin-left:auto}
.dl-btn:hover{border-color:var(--green);color:var(--green)}

@media(max-width:1100px){.row-3{grid-template-columns:1fr 1fr}.row-6040{grid-template-columns:1fr}}
@media(max-width:700px){.row-3{grid-template-columns:1fr}.header-center{display:none}.col-m-hide{display:none!important}.tab-btn{min-height:44px}}

/* SESSION EXPIRY MODAL */
#session-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;align-items:center;justify-content:center}
#session-modal.show{display:flex}
.session-modal-card{background:var(--panel);border:1px solid var(--red);border-radius:var(--r);padding:28px 32px;width:320px;display:flex;flex-direction:column;gap:12px;text-align:center}
.session-modal-title{font-family:var(--mono);font-size:.9rem;font-weight:600;color:var(--text1)}
.session-modal-count{font-family:var(--mono);font-size:2rem;font-weight:600;color:var(--red)}
.session-modal-sub{font-size:.72rem;color:var(--text3)}
.session-modal-btn{background:var(--green);color:#000;font-family:var(--mono);font-size:.78rem;font-weight:600;border:none;border-radius:var(--r);padding:10px;cursor:pointer}
.session-modal-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="app-loading"><div class="spin"></div></div>
<div id="root"></div>
<div id="session-modal">
  <div class="session-modal-card">
    <div class="session-modal-title">Session expiring</div>
    <div class="session-modal-count" id="session-countdown">60</div>
    <div class="session-modal-sub">No activity detected. You will be logged out automatically.</div>
    <button class="session-modal-btn" onclick="resetSessionTimer()">Stay logged in</button>
  </div>
</div>
<script type="text/babel">
/* =====================================================
   CONFIG
   ===================================================== */
const CONFIG = {
  API_BASE:       'https://k24gcypjyh.execute-api.eu-west-2.amazonaws.com/admin',
  COGNITO_DOMAIN: 'https://algodesk-admin-dev.auth.eu-west-2.amazoncognito.com',

const IDP_URL = 'https://cognito-idp.eu-west-2.amazonaws.com/';

/* =====================================================
   AUTH HELPERS
   ===================================================== */
const getToken  = () => localStorage.getItem('neo_admin_token');
const clearAuth = () => ['neo_admin_token','neo_admin_user','neo_admin_refresh'].forEach(k => localStorage.removeItem(k));
const parseJwt  = t => { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return null; } };

async function tryRefreshToken() {
  const rt = localStorage.getItem('neo_admin_refresh');
  if (!rt) return false;
  try {
    const r = await fetch(IDP_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/x-amz-json-1.1','X-Amz-Target':'AWSCognitoIdentityProviderService.InitiateAuth'},
      body: JSON.stringify({ClientId:CONFIG.CLIENT_ID,AuthFlow:'REFRESH_TOKEN_AUTH',AuthParameters:{REFRESH_TOKEN:rt}}),
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok || !d.AuthenticationResult) return false;
    localStorage.setItem('neo_admin_token', d.AuthenticationResult.IdToken);
    return true;
  } catch { return false; }
}

async function apiFetch(path) {
  const p = parseJwt(getToken());
  if (!p || p.exp*1000 < Date.now()+60000) {
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
  }
  let res = await fetch(`${CONFIG.API_BASE}${path}`, {headers:{Authorization:`Bearer ${getToken()}`}});
  if (res.status === 401) {
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
    res = await fetch(`${CONFIG.API_BASE}${path}`, {headers:{Authorization:`Bearer ${getToken()}`}});
  }
  if (!res.ok) throw new Error(`${path} → ${res.status}`);
  return res.json();
}

async function apiPost(path, body) {
  const p = parseJwt(getToken());
  if (!p || p.exp*1000 < Date.now()+60000) {
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
  }
  const res = await fetch(`${CONFIG.API_BASE}${path}`, {
    method:'POST', headers:{Authorization:`Bearer ${getToken()}`,'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const json = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(json.message || `${path} → ${res.status}`);
  return json;
}

const {useState, useEffect, useCallback} = React;

/* =====================================================
   HELPERS
   ===================================================== */
function relTime(ts) {
  if (!ts) return '—';
  const m = (Date.now() - new Date(ts).getTime()) / 60000;
  if (m < 1) return 'just now';
  if (m < 60) return `${Math.round(m)}m ago`;
  return `${Math.floor(m/60)}h ${Math.round(m%60)}m ago`;
}
function fmt(n, dec=2) { if (n==null||n==='') return '—'; return Number(n).toFixed(dec); }
function fmtPips(n) { if (n==null) return '—'; return (n>=0?'+':'')+Number(n).toFixed(1); }
function sgn(v) { return v > 0.05 ? 'bull' : v < -0.05 ? 'bear' : 'neut'; }

function sessionInfo(s) {
  if (!s) return {cls:'session-off',label:'Off-Hours'};
  const sl = (s+'').toLowerCase();
  if (sl.includes('london')) return {cls:'session-london',label:'London'};
  if (sl.includes('new_york')||sl.includes('new york')||sl==='ny') return {cls:'session-ny',label:'New York'};
  if (sl.includes('asian')||sl.includes('asia')||sl.includes('tokyo')) return {cls:'session-asian',label:'Asian'};
  return {cls:'session-off',label:'Off-Hours'};
}

function stressInfo(s) {
  if (!s) return {cls:'stress-low',color:'var(--text3)'};
  const sl = (s+'').toLowerCase();
  if (sl==='high'||sl==='extreme') return {cls:'stress-high',color:'var(--red)'};
  if (sl==='medium'||sl==='moderate'||sl==='elevated') return {cls:'stress-med',color:'var(--amber)'};
  return {cls:'stress-low',color:'var(--green)'};
}

/* Derive latest per-pair state from decisions array */
function latestDecisions(decisions) {
  if (!decisions || !decisions.length) return {};
  const maxCycle = Math.max(...decisions.map(d=>d.cycle_number||0));
  const map = {};
  decisions.filter(d=>d.cycle_number>=maxCycle-2).forEach(d=>{
    if (!map[d.pair]||d.cycle_number>(map[d.pair].cycle_number||0)) map[d.pair]=d;
  });
  return map;
}

/* =====================================================
   LOGIN
   ===================================================== */
function Login({onAuth}) {
  const [stage,setStage]=useState('password');
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [code,setCode]=useState('');
  const [newPass,setNewPass]=useState('');
  const [session,setSession]=useState('');
  const [qrUri,setQrUri]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const cogCall = async (target,body) => {
    const r = await fetch(IDP_URL, {
      method:'POST',
      headers:{'Content-Type':'application/x-amz-json-1.1','X-Amz-Target':`AWSCognitoIdentityProviderService.${target}`},
      body:JSON.stringify(body),
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.message||d.__type||`${target} failed`);
    return d;
  };

  const storeAuth = d => {
    localStorage.setItem('neo_admin_token', d.AuthenticationResult.IdToken);
    localStorage.setItem('neo_admin_user', user);
    if (d.AuthenticationResult.RefreshToken) localStorage.setItem('neo_admin_refresh', d.AuthenticationResult.RefreshToken);
    onAuth();
  };

  const submitPassword = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const d = await cogCall('InitiateAuth',{ClientId:CONFIG.CLIENT_ID,AuthFlow:'USER_PASSWORD_AUTH',AuthParameters:{USERNAME:user,PASSWORD:pass}});
      if (d.ChallengeName==='NEW_PASSWORD_REQUIRED') { setSession(d.Session); setStage('newpass'); }
      else if (d.ChallengeName==='MFA_SETUP') {
        const a = await cogCall('AssociateSoftwareToken',{Session:d.Session});
        setQrUri(`otpauth://totp/ProjectNeo:${encodeURIComponent(user)}?secret=${a.SecretCode}&issuer=ProjectNeo`);
        setSession(a.Session); setStage('setup');
      } else if (d.ChallengeName==='SOFTWARE_TOKEN_MFA') { setSession(d.Session); setStage('totp'); }
      else if (d.AuthenticationResult) storeAuth(d);
    } catch(e2){setErr(e2.message);}finally{setLoading(false);}
  };

  const submitNewPass = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const d = await cogCall('RespondToAuthChallenge',{ClientId:CONFIG.CLIENT_ID,ChallengeName:'NEW_PASSWORD_REQUIRED',Session:session,ChallengeResponses:{USERNAME:user,NEW_PASSWORD:newPass}});
      if (d.ChallengeName==='MFA_SETUP') {
        const a = await cogCall('AssociateSoftwareToken',{Session:d.Session});
        setQrUri(`otpauth://totp/ProjectNeo:${encodeURIComponent(user)}?secret=${a.SecretCode}&issuer=ProjectNeo`);
        setSession(a.Session); setStage('setup');
      } else if (d.ChallengeName==='SOFTWARE_TOKEN_MFA') { setSession(d.Session); setStage('totp'); }
      else if (d.AuthenticationResult) storeAuth(d);
    } catch(e2){setErr(e2.message);}finally{setLoading(false);}
  };

  const submitTOTP = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const d = await cogCall('RespondToAuthChallenge',{ClientId:CONFIG.CLIENT_ID,ChallengeName:'SOFTWARE_TOKEN_MFA',Session:session,ChallengeResponses:{USERNAME:user,SOFTWARE_TOKEN_MFA_CODE:code}});
      if (d.AuthenticationResult) storeAuth(d); else setErr('Authentication failed.');
    } catch(e2){setErr(e2.message);}finally{setLoading(false);}
  };

  const submitSetup = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      await cogCall('VerifySoftwareToken',{Session:session,UserCode:code});
      const d = await cogCall('RespondToAuthChallenge',{ClientId:CONFIG.CLIENT_ID,ChallengeName:'MFA_SETUP',Session:session,ChallengeResponses:{USERNAME:user,SOFTWARE_TOKEN_MFA_CODE:code}});
      if (d.AuthenticationResult) storeAuth(d); else setErr('Verification failed.');
    } catch(e2){setErr(e2.message);}finally{setLoading(false);}
  };

  const Card = ({title,sub,children}) => (
    <div className="login-wrap"><div className="login-card">
      <div className="login-title">{title}</div>
      {sub && <div className="login-sub">{sub}</div>}
      {children}
    </div></div>
  );

  if (stage==='totp') return (
    <Card title="Two-factor authentication" sub="Enter the 6-digit code from your authenticator app">
      <form onSubmit={submitTOTP} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="login-field"><label>Auth code</label><input autoFocus value={code} onChange={e=>setCode(e.target.value)} maxLength={6} inputMode="numeric"/></div>
        {err&&<div className="login-err">{err}</div>}
        <button className="login-btn" disabled={loading||code.length<6}>{loading?'Verifying…':'Verify'}</button>
      </form>
    </Card>
  );
  if (stage==='setup') return (
    <Card title="Set up two-factor authentication" sub="Scan this QR code with your authenticator app">
      <img className="qr-img" src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrUri)}`} alt="QR"/>
      <form onSubmit={submitSetup} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="login-field"><label>Verification code</label><input autoFocus value={code} onChange={e=>setCode(e.target.value)} maxLength={6} inputMode="numeric"/></div>
        {err&&<div className="login-err">{err}</div>}
        <button className="login-btn" disabled={loading||code.length<6}>{loading?'Verifying…':'Confirm setup'}</button>
      </form>
    </Card>
  );
  if (stage==='newpass') return (
    <Card title="Set new password" sub="Required on first sign-in">
      <form onSubmit={submitNewPass} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="login-field"><label>New password</label><input autoFocus type="password" value={newPass} onChange={e=>setNewPass(e.target.value)}/></div>
        {err&&<div className="login-err">{err}</div>}
        <button className="login-btn" disabled={loading||!newPass}>{loading?'Saving…':'Set password'}</button>
      </form>
    </Card>
  );
  return (
    <Card title="Project Neo" sub="Admin dashboard · eu-west-2">
      <form onSubmit={submitPassword} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="login-field"><label>Username</label><input autoFocus value={user} onChange={e=>setUser(e.target.value)} autoComplete="username"/></div>
        <div className="login-field"><label>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} autoComplete="current-password"/></div>
        {err&&<div className="login-err">{err}</div>}
        <button className="login-btn" disabled={loading||!user||!pass}>{loading?'Signing in…':'Sign in'}</button>
      </form>
    </Card>
  );
}

/* =====================================================
   ROW 2 COL 1: CONVERGENCE SCORES
   ===================================================== */
function ConvergencePanel({convergence,decisions}) {
  const pairDec = latestDecisions(decisions);
  const maxCycle = decisions&&decisions.length ? Math.max(...decisions.map(d=>d.cycle_number||0)) : 0;

  const rows = (convergence||[])
    .map(c => {
      const d = pairDec[c.pair] || {};
      return {...c, macro:d.macro_score, tech:d.technical_score, bias:d.bias};
    })
    .sort((a,b)=>Math.abs(b.score||0)-Math.abs(a.score||0));

  if (!rows.length) return (
    <div className="panel">
      <div className="panel-hdr"><span className="panel-title">Convergence Scores</span></div>
      <div className="empty-state"><div className="em-icon">◌</div><span>Waiting for signal data</span></div>
    </div>
  );

  const maxAbs = Math.max(...rows.map(r=>Math.abs(r.score||0)), 0.01);

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Convergence Scores</span>
        <span className="panel-sub">cycle {maxCycle} · {rows.length} pairs</span>
      </div>
      <div className="conv-hdr-row">
        <span className="conv-hdr-cell">Pair</span>
        <span className="conv-hdr-cell">Score</span>
        <span className="conv-hdr-cell r">Macro</span>
        <span className="conv-hdr-cell r">Tech</span>
        <span className="conv-hdr-cell r">Bias</span>
      </div>
      <div>
        {rows.map(r => {
          const cls = sgn(r.score||0);
          const pct = Math.round(Math.abs(r.score||0)/maxAbs*100);
          return (
            <div key={r.pair} className="conv-row">
              <span className="conv-pair">{r.pair}</span>
              <div className="conv-bar-wrap">
                <div className={`conv-bar-fill ${cls}-fill`} style={{width:`${pct}%`}}/>
              </div>
              <span className={`conv-score ${cls}`}>{fmt(r.score,3)}</span>
              <span className="conv-sub">{r.macro!=null?fmt(r.macro,2):'—'} / {r.tech!=null?fmt(r.tech,2):'—'}</span>
              <div className={`dir-badge dir-${cls}`}>{cls==='bull'?'BULL':cls==='bear'?'BEAR':'NEUT'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  );

              <th>Stop</th><th>Target</th><th>Held</th>
              <th className="col-m-hide">Structure</th>
            </tr></thead>
            <tbody>
              {pos.map((p,i)=>{
                // Lambda fields: unrealised_pips (float), hold_hours (float), stop_price, target_price
                const pips = p.unrealised_pips ?? null;
                const holdH = p.hold_hours ?? null;
                const heldStr = holdH != null
                  ? holdH < 1
                    ? `${Math.round(holdH*60)}m`
                    : `${Math.floor(holdH)}h ${Math.round((holdH%1)*60)}m`
                  : '—';
                return (
                  <tr key={i}>
                    <td className="mono">{p.profile||p.user_id?.slice(-6)||'—'}</td>
                    <td className="mono" style={{fontWeight:600}}>{p.instrument||p.pair||'—'}</td>
                    <td className={p.direction==='long'?'dir-long':'dir-short'}>{(p.direction||'').toUpperCase()}</td>
                    <td className="mono">{p.position_size!=null?Number(p.position_size).toLocaleString():'—'}</td>
                    <td className="mono">{fmt(p.entry_price,4)}</td>
                    <td className="mono">{p.current_price!=null?fmt(p.current_price,4):'—'}</td>
                    <td className={pips==null?'':pips>=0?'val-pos':'val-neg'}>{pips!=null?fmtPips(pips):'—'}</td>
                    <td className="mono val-dim">{p.stop_price!=null?fmt(p.stop_price,4):'—'}</td>
                    <td className="mono val-dim">{p.target_price!=null?fmt(p.target_price,4):'—'}</td>
                    <td className="mono val-dim">{heldStr}</td>
                    <td className="mono val-dim col-m-hide" style={{fontSize:'.6rem'}}>{p.regime_at_entry||p.session_at_entry||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* =====================================================
   ROW 3 COL 2: PORTFOLIO EXPOSURE
   ===================================================== */
function PortfolioExposurePanel({portfolio_exposure,openPositions}) {
  const pos = Array.isArray(openPositions) ? openPositions : [];
  const jpyCount = pos.filter(p=>(p.pair||p.instrument||'').includes('JPY')).length;
  const exp = portfolio_exposure;

  const profiles = exp?.profiles || exp?.per_profile || [];

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Portfolio Exposure</span>
        <span className="panel-sub">Risk budget utilisation</span>
      </div>
      {!profiles.length && !pos.length ? (
        <div className="empty-state"><div className="em-icon">◻</div><span>No exposure</span></div>
      ) : profiles.length ? (
        profiles.map((pr,i)=>{
          const usdUsed=pr.usd_used??pr.total_exposure??0;
          const usdCap=pr.usd_cap??pr.max_exposure??1;
          const posUsed=pr.positions_used??pr.open_count??0;
          const posCap=pr.positions_cap??pr.max_positions??4;
          const usdPct=Math.min(100,Math.round(usdUsed/usdCap*100));
          const posPct=Math.min(100,Math.round(posUsed/posCap*100));
          const barClr=usdPct>80?'var(--red)':usdPct>60?'var(--amber)':'var(--green)';
          return (
            <div key={i} className="exp-profile">
              <div className="exp-name">{pr.profile||pr.user_id||`Profile ${i+1}`}</div>
              <div className="exp-bar-row">
                <span className="exp-bar-lbl">USD exposure</span>
                <div className="exp-bar-outer"><div className="exp-bar-inner" style={{width:`${usdPct}%`,background:barClr}}/></div>
                <span className="exp-bar-val">{usdPct}% of cap</span>
              </div>
              <div className="exp-bar-row">
                <span className="exp-bar-lbl">Positions</span>
                <div className="exp-bar-outer"><div className="exp-bar-inner" style={{width:`${posPct}%`,background:'var(--blue)'}}/></div>
                <span className="exp-bar-val">{posUsed}/{posCap}</span>
              </div>
            </div>
          );
        })
      ) : (
        /* Derive exposure from raw positions when no exposure endpoint */
        (() => {
          const ccyCount={};
          pos.forEach(p=>{
            const inst=(p.pair||p.instrument||'').replace('/','');
            if (inst.length>=6) {
              const base=inst.slice(0,3), quote=inst.slice(3,6);
              ccyCount[base]=(ccyCount[base]||0)+1;
              ccyCount[quote]=(ccyCount[quote]||0)+1;
            }
          });
          return (
            <div>
              <div className="sec-hdr first">Currency exposure</div>
              {Object.entries(ccyCount).sort((a,b)=>b[1]-a[1]).map(([ccy,cnt])=>(
                <div key={ccy} className="macro-stat">
                  <span className="macro-lbl">{ccy}</span>
                  <span className="macro-val mono-sm">{cnt} position{cnt>1?'s':''}</span>
                </div>
              ))}
            </div>
          );
        })()
      )}
      {jpyCount>=2 && <div className="exp-warn">⚠ JPY concentration: {jpyCount} positions open</div>}
      {exp?.total_risk_pct!=null && (
        <div className="macro-stat" style={{marginTop:8}}>
          <span className="macro-lbl">Portfolio risk</span>
          <span className={`macro-val ${exp.total_risk_pct>2?'text-red':exp.total_risk_pct>1?'text-amber':'text-green'}`}>
            {fmt(exp.total_risk_pct,2)}%
          </span>
        </div>
      )}
    </div>
  );
}

/* =====================================================
   ROW 4 COL 1: TECHNICAL SIGNALS
   ===================================================== */
function TechnicalSignalsPanel({signals_full,decisions}) {
  const PRIMARY=['EUR/USD','GBP/USD','USD/JPY','AUD/USD','EUR/JPY','GBP/JPY','AUD/JPY','CAD/JPY','EUR/GBP','EUR/AUD'];
  const pairDec = latestDecisions(decisions);

  const regimeMap={};
  (signals_full||[]).filter(s=>s.agent_name==='regime'&&s.pair).forEach(s=>{
    if (!regimeMap[s.pair]||new Date(s.created_at)>new Date(regimeMap[s.pair].created_at)) regimeMap[s.pair]=s;
  });

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Technical Signals</span>
        <span className="panel-sub">10 primary pairs</span>
      </div>
      <div className="tech-hdr-row">
        <span className="tech-hdr-cell">Pair</span>
        <span className="tech-hdr-cell" style={{textAlign:'center'}}>Tech</span>
        <span className="tech-hdr-cell" style={{textAlign:'center'}}>ADX</span>
        <span className="tech-hdr-cell">Regime</span>
        <span className="tech-hdr-cell" style={{textAlign:'right'}}>Status</span>
      </div>
      {PRIMARY.map(pair=>{
        const d=pairDec[pair]||{};
        const r=regimeMap[pair];
        const techScore=d.technical_score??null;
        const adx=r?.payload?.adx??null;
        const regime=r?.payload?.regime||r?.payload?.decision||null;
        const regimePct=adx?Math.min(100,Math.round(adx/50*100)):0;
        const rej=(d.rejection_reasons||'').toLowerCase();
        const hasTech=techScore!=null&&Math.abs(techScore)>0.1;
        const cls=sgn(techScore||0);
        return (
          <div key={pair} className="tech-row">
            <span className="tech-pair">{pair}</span>
            <span className={`tech-val ${cls==='bull'?'bull':cls==='bear'?'bear':'neut'}`}>
              {techScore!=null?(techScore>=0?'+':'')+fmt(techScore,2):'—'}
            </span>
            <span className="tech-val text-dim">{adx?fmt(adx,0):'—'}</span>
            <div className="regime-bar">
              <div className={`regime-fill fill-${regime||''}`} style={{width:`${regimePct}%`}}/>
            </div>
            <div className={`dir-badge ${hasTech?`dir-${cls}`:'dir-neut'}`} style={{textAlign:'right',fontSize:'.57rem'}}>
              {hasTech?(regime||'SIG').toUpperCase().replace('_',' ').slice(0,7):rej.includes('missing_signal')?'ABSENT':'—'}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* =====================================================
   ROW 4 COL 2: LEARNING MODULE
   ===================================================== */
function LearningPanel({learning,proposals}) {
  const l=learning||{};
  const accuracy=l.accuracy||l.agent_accuracy||[];
  const patterns=l.patterns||l.active_patterns||[];
  const failures=l.failures||l.failure_modes||[];
  const tradeCount=l.trade_count??l.closed_trade_count??0;
  const toPatterns=Math.max(0,30-tradeCount);
  const toKelly=Math.max(0,50-tradeCount);
  const pendingProposal=(proposals||[]).filter(p=>!p.status||p.status==='pending')[0];

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Learning Module</span>
        <span className="panel-sub">{tradeCount} closed trades</span>
      </div>

      <div className="sec-hdr first">Active patterns</div>
      {patterns.length===0 ? (
        <div className="lstat"><span className="lstat-lbl">No patterns yet</span>
          <span className="lstat-val text-dim">{toPatterns>0?`${toPatterns} to threshold`:'Building…'}</span></div>
      ) : patterns.slice(0,3).map((p,i)=>(
        <div key={i} className="lstat">
          <span className="lstat-lbl">{p.description||p.name||`Pattern ${i+1}`}</span>
          <span className="lstat-val">{p.confidence?fmt(p.confidence*100,0)+'%':'—'}</span>
        </div>
      ))}

      <div className="sec-hdr">Agent accuracy</div>
      {accuracy.length===0 ? (
        <div style={{padding:'4px 0',color:'var(--text3)',fontSize:'.68rem'}}>{'<'}20 trades per agent</div>
      ) : accuracy.map((a,i)=>{
        const pct=a.pct??a.accuracy_pct??(a.win_rate?a.win_rate*100:null);
        return (
          <div key={i} className="acc-row">
            <span className="acc-lbl">{a.agent||a.name||`Agent ${i+1}`}</span>
            <div className="acc-bar-wrap"><div className="acc-bar-fill" style={{width:`${pct||0}%`}}/></div>
            <span className="acc-val">{pct!=null?fmt(pct,0)+'%':'—'}</span>
          </div>
        );
      })}

      <div className="sec-hdr">Trade gates</div>
      <div className="lstat"><span className="lstat-lbl">Patterns gate (30 trades)</span>
        <span className={`lstat-val ${toPatterns===0?'text-green':'text-amber'}`}>{toPatterns>0?`−${toPatterns}`:'UNLOCKED'}</span></div>
      <div className="lstat"><span className="lstat-lbl">Kelly gate (50 trades)</span>
        <span className={`lstat-val ${toKelly===0?'text-green':'text-amber'}`}>{toKelly>0?`−${toKelly}`:'UNLOCKED'}</span></div>

      {pendingProposal && (
        <div className="proposal-box">
          <div className="proposal-ttl">⚑ Pending proposal — {pendingProposal.type||'review'}</div>
          <div className="proposal-body">{pendingProposal.description||pendingProposal.summary||JSON.stringify(pendingProposal).slice(0,140)}</div>
        </div>
      )}

      {failures.length>0 && (
        <>
          <div className="sec-hdr">Failure modes</div>
          {failures.slice(0,3).map((f,i)=>(
            <div key={i} className="lstat">
              <span className="lstat-lbl">{f.mode||f.name||`Mode ${i+1}`}</span>
              <span className="lstat-val text-red">{f.count??'—'}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* =====================================================
   ROW 4 COL 3: REGIME & STRESS
   ===================================================== */
function RegimeStressPanel({decisions,signals_full}) {
  const PRIMARY=['EUR/USD','GBP/USD','USD/JPY','AUD/USD','EUR/JPY','GBP/JPY','AUD/JPY','CAD/JPY','EUR/GBP','EUR/AUD'];
  const pairDec = latestDecisions(decisions);
  const sample=Object.values(pairDec)[0]||{};

  const stressScore=sample.stress_score??null;
  const stressState=sample.stress_state??null;
  const session=sample.current_session??null;
  const {cls:sessCls,label:sessLabel}=sessionInfo(session);
  const {cls:stressCls}=stressInfo(stressState);

  const gaugePct=stressScore!=null?Math.min(100,Math.round(stressScore/60*100)):0;
  const gaugeClass=stressScore==null?'gauge-low':stressScore>40?'gauge-high':stressScore>20?'gauge-med':'gauge-low';

  const regimeMap={};
  (signals_full||[]).filter(s=>s.agent_name==='regime'&&s.pair).forEach(s=>{
    if (!regimeMap[s.pair]||new Date(s.created_at)>new Date(regimeMap[s.pair].created_at)) regimeMap[s.pair]=s;
  });

  const orchSig=(signals_full||[]).find(s=>s.agent_name==='orchestrator');
  const tb=orchSig?.payload?.threshold_breakdown||{};

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Regime &amp; Stress</span>
        <span className={`session-badge ${sessCls}`}>{sessLabel}</span>
      </div>

      <div className="sec-hdr first">Stress gauge</div>
      <div className="gauge-wrap">
        <span className={`gauge-lbl ${stressScore==null?'text-dim':stressScore>40?'text-red':stressScore>20?'text-amber':'text-green'}`}>
          {stressScore!=null?fmt(stressScore,1):'—'}
        </span>
        <div className="gauge-bar"><div className={`gauge-fill ${gaugeClass}`} style={{width:`${gaugePct}%`}}/></div>
        <span className={`stress-badge ${stressCls}`}>{(stressState||'—').toUpperCase()}</span>
      </div>

      {Object.keys(tb).length>0 && (
        <>
          <div className="sec-hdr">Threshold breakdown</div>
          {[
            ['Base threshold', tb.base_threshold],
            ['Stress adj', tb.stress_adjustment],
            ['Effective', tb.effective_threshold],
            ['Size mult', tb.combined_size_multiplier],
          ].filter(([,v])=>v!=null).map(([lbl,val])=>(
            <div key={lbl} className="stress-comp-row">
              <span className="stress-comp-lbl">{lbl}</span>
              <div className="stress-comp-bar"><div className="stress-comp-fill" style={{width:`${Math.min(100,Math.round(Math.abs(val)*100))}%`}}/></div>
              <span className="stress-comp-val">{fmt(val,4)}</span>
            </div>
          ))}
        </>
      )}

      <div className="sec-hdr">Regime — primary 10</div>
      {PRIMARY.map(pair=>{
        const r=regimeMap[pair];
        const regime=r?.payload?.regime||r?.payload?.decision||null;
        const adx=r?.payload?.adx;
        return (
          <div key={pair} className="regime-pair-row">
            <span className="regime-pair">{pair}</span>
            <span className={`regime-val r-${regime||''}`}>{regime?regime.replace(/_/g,' ').toUpperCase():'—'}</span>
            <span className="mono-sm text-dim" style={{textAlign:'right'}}>{adx?'ADX '+fmt(adx,0):'—'}</span>
          </div>
        );
      })}
    </div>
  );
}

/* =====================================================
   TAB: AGENT OBSERVATION
   ===================================================== */
function ObservationTab({signals_full, decisions}) {
  const [pairFilter, setPairFilter] = useState(null);
  const [expandedPairs, setExpandedPairs] = useState({});

  const AGENT_COLORS = {
    macro:'var(--purple)', technical:'var(--blue)', regime:'var(--amber)',
    orchestrator:'var(--green)', risk_guardian:'var(--red)',
  };
  const PAIRS_ALL = ['EURUSD','GBPUSD','USDJPY','AUDUSD','EURJPY','GBPJPY','AUDJPY','CADJPY','EURGBP','EURAUD',
    'USDCAD','USDCHF','NZDUSD','EURCHF','GBPCHF','GBPAUD','EURCAD','GBPCAD','AUDNZD','NZDJPY'];

  const pairDec = latestDecisions(decisions);

  // Group signals_full by instrument/pair, latest per agent per pair
  const pairAgentMap = {};
  (signals_full || []).filter(s => s.pair).forEach(s => {
    const instr = (s.instrument || s.pair || '').replace('/','');
    if (!pairAgentMap[instr]) pairAgentMap[instr] = {};
    const existing = pairAgentMap[instr][s.agent_name];
    if (!existing || new Date(s.created_at) > new Date(existing.created_at)) {
      pairAgentMap[instr][s.agent_name] = s;
    }
  });

  const pairs = pairFilter
    ? [pairFilter]
    : Object.keys(pairAgentMap).sort((a,b) => {
        const sa = Math.abs(pairDec[a.slice(0,3)+'/'+a.slice(3)]?.macro_score || 0);
        const sb = Math.abs(pairDec[b.slice(0,3)+'/'+b.slice(3)]?.macro_score || 0);
        return sb - sa;
      });

  const toggle = instr => setExpandedPairs(e => ({...e, [instr]: !e[instr]}));

  const downloadCsv = () => {
    const rows = [];
    rows.push(['pair','agent','bias','score','confidence','reasoning','created_at'].join(','));
    Object.entries(pairAgentMap).forEach(([instr, agents]) => {
      Object.entries(agents).forEach(([agent, s]) => {
        const reasoning = (s.payload?.reasoning || '').replace(/"/g,'""');
        rows.push([instr, agent, s.bias, s.score, s.confidence, `"${reasoning}"`, s.created_at].join(','));
      });
    });
    const blob = new Blob([rows.join('\n')], {type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='signals.csv'; a.click();
  };

  return (
    <div>
      <div className="obs-controls">
        <button className={`obs-chip ${!pairFilter?'active':''}`} onClick={()=>setPairFilter(null)}>All pairs</button>
        {PAIRS_ALL.map(p => (
          pairAgentMap[p] ? (
            <button key={p} className={`obs-chip ${pairFilter===p?'active':''}`}
              onClick={()=>setPairFilter(pairFilter===p?null:p)}>
              {p.slice(0,3)}/{p.slice(3)}
            </button>
          ) : null
        ))}
        <button className="dl-btn" onClick={downloadCsv}>↓ Download CSV</button>
      </div>
      <div style={{fontSize:'.65rem',color:'var(--text3)',marginBottom:8,fontFamily:'var(--mono)',letterSpacing:'.06em',textTransform:'uppercase'}}>
        Agent reasoning — latest cycle · {Object.keys(pairAgentMap).length} pairs
      </div>
      {!pairs.length && <div className="empty-state"><div className="em-icon">◌</div><span>No signal data</span></div>}
      {pairs.map(instr => {
        const agents = pairAgentMap[instr] || {};
        const pairLabel = instr.slice(0,3)+'/'+instr.slice(3);
        const dec = pairDec[pairLabel] || {};
        const isExpanded = expandedPairs[instr] !== false; // default expanded
        const conv = dec.final_convergence;
        const convCls = conv == null ? 'neut' : conv > 0.05 ? 'bull' : conv < -0.05 ? 'bear' : 'neut';
        return (
          <div key={instr} className="obs-pair-section">
            <div className="obs-pair-hdr" onClick={() => toggle(instr)}>
              <span style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontWeight:700}}>{pairLabel}</span>
                {conv != null && <span className={`dir-badge dir-${convCls}`}>{conv>=0?'+':''}{fmt(conv,3)}</span>}
                {dec.rejection_reasons && <span style={{fontSize:'.6rem',color:'var(--text3)',fontWeight:400}}>{String(dec.rejection_reasons).slice(0,50)}</span>}
              </span>
              <span style={{color:'var(--text3)',fontSize:'.7rem'}}>{isExpanded ? '▲' : '▼'}</span>
            </div>
            {isExpanded && (
              <div>
                {Object.entries(agents).map(([agent, s]) => {
                  const color = AGENT_COLORS[agent] || 'var(--text3)';
                  const payload = s.payload || {};
                  const reasoning = payload.reasoning || '';
                  const adx = payload.adx;
                  const regime = payload.regime || payload.decision;
                  const ccy = payload.currency_scores;
                  return (
                    <div key={agent} className="obs-agent-row" style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                      <span className="obs-agent-name" style={{color}}>{agent}</span>
                      <div style={{flex:1}}>
                        <div className="obs-signal-detail">
                          <span className={`dir-badge dir-${sgn(s.score||0)}`} style={{marginRight:6}}>
                            {s.bias || (s.score>0?'bull':s.score<0?'bear':'neut')}
                          </span>
                          <span style={{fontFamily:'var(--mono)',fontSize:'.65rem',fontWeight:600,marginRight:8}}>
                            {s.score!=null?(s.score>=0?'+':'')+fmt(s.score,3):'—'}
                          </span>
                          {reasoning && <span style={{color:'var(--text3)',fontSize:'.62rem'}}>{reasoning.slice(0,120)}</span>}
                          {adx && <span style={{color:'var(--text3)',fontSize:'.62rem',marginLeft:8}}>ADX {fmt(adx,1)}</span>}
                          {regime && <span className={`dir-badge dir-neut`} style={{marginLeft:6,fontSize:'.57rem'}}>{regime.replace(/_/g,' ')}</span>}
                          {ccy && Object.entries(ccy).slice(0,2).map(([c,v])=>(
                            <span key={c} style={{marginLeft:6,fontFamily:'var(--mono)',fontSize:'.6rem',color:'var(--text3)'}}>
                              {c}:{v.score>=0?'+':''}{fmt(v.score,3)}
                            </span>
                          ))}
                        </div>
                      </div>
                      <span className="obs-signal-meta">{relTime(s.created_at)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* =====================================================
   TAB: TRADES (full history + filters)
   ===================================================== */
function TradesTab({trades, openPositions, onDownload}) {
  const [period, setPeriod] = useState('all');
  const PERIODS = [['Today','today'],['This week','week'],['This month','month'],['All time','all']];

  const filtered = (trades||[]).filter(t => {
    if (period === 'all') return true;
    const d = (t.exit_time||t.closed_at||t.exit_date||'').slice(0,10);
    const now = new Date();
    const today = now.toISOString().slice(0,10);
    if (period === 'today') return d === today;
    if (period === 'week') { const w = new Date(now); w.setDate(w.getDate()-w.getDay()+1); return d >= w.toISOString().slice(0,10); }
    if (period === 'month') return d >= `${today.slice(0,7)}-01`;
    return true;
  });

  const totalPnl = filtered.reduce((s,t) => s+(t.pnl||t.profit_loss||0), 0);
  const wins = filtered.filter(t => (t.pnl||t.profit_loss||0) > 0).length;
  const winRate = filtered.length ? Math.round(wins/filtered.length*100) : null;

  const dlCsv = () => {
    const hdrs = ['time','profile','pair','direction','entry','exit','pips','pnl','hold','exit_reason','conv'];
    const rows = filtered.map(t => {
      const pips=t.pnl_pips??t.pips??'';
      const pnl=t.pnl??t.profit_loss??'';
      const held=t.held_minutes??t.hold_minutes??'';
      return [t.exit_time||t.closed_at||'',t.profile||'',t.instrument||t.pair||'',t.direction||'',
        t.entry_price||'',t.exit_price||'',pips,pnl,held,t.exit_reason||'',t.convergence_score||t.conv||''].join(',');
    });
    const blob = new Blob([[hdrs.join(','),...rows].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trades.csv';a.click();
  };

  return (
    <div>
      {/* Open positions at top */}
      <div style={{marginBottom:12}}>
        <OpenPositionsPanel openPositions={openPositions}/>
      </div>

      {/* Closed trades with filter */}
      <div className="panel">
        <div className="panel-hdr" style={{marginBottom:8}}>
          <span className="panel-title">Closed Trades</span>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            {PERIODS.map(([lbl,key])=>(
              <button key={key} className={`obs-chip ${period===key?'active':''}`} onClick={()=>setPeriod(key)}>{lbl}</button>
            ))}
            <button className="dl-btn" onClick={dlCsv}>↓ CSV</button>
          </div>
        </div>
        <div style={{display:'flex',gap:20,padding:'6px 0 10px',borderBottom:'1px solid var(--border)',marginBottom:8}}>
          <div className="header-stat">
            <span className="lbl">Total trades</span>
            <span className="val">{filtered.length}</span>
          </div>
          <div className="header-stat">
            <span className="lbl">Win rate</span>
            <span className={`val ${winRate==null?'':winRate>=50?'pos':'neg'}`}>{winRate!=null?winRate+'%':'—'}</span>
          </div>
          <div className="header-stat">
            <span className="lbl">Total P&L</span>
            <span className={`val ${totalPnl>=0?'pos':'neg'}`}>{totalPnl>=0?'+$':'-$'}{Math.abs(totalPnl).toFixed(0)}</span>
          </div>
        </div>
        {!filtered.length ? (
          <div className="empty-state"><div className="em-icon">◻</div><span>No trades for this period</span></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Time</th><th>Profile</th><th>Pair</th><th>Dir</th>
                <th>Entry</th><th>Exit</th><th>Pips</th><th>P&L</th>
                <th>Hold</th><th>Exit reason</th><th>Conv</th>
              </tr></thead>
              <tbody>
                {filtered.map((t,i)=>{
                  const pips=t.pnl_pips??t.pips??null;
                  const pnl=t.pnl??t.profit_loss??null;
                  const held=t.held_minutes??t.hold_minutes??null;
                  const exitTs=t.exit_time??t.exit_date??t.closed_at??null;
                  const conv=t.conv??t.convergence_score??t.final_convergence??null;
                  return (
                    <tr key={i}>
                      <td className="mono val-dim" style={{fontSize:'.62rem'}}>{exitTs?relTime(exitTs):'—'}</td>
                      <td className="mono" style={{fontSize:'.65rem'}}>{t.profile||t.user_id?.slice(-6)||'—'}</td>
                      <td className="mono" style={{fontWeight:600}}>{t.instrument||t.pair||'—'}</td>
                      <td className={t.direction==='long'?'dir-long':'dir-short'}>{(t.direction||'').toUpperCase()}</td>
                      <td className="mono">{fmt(t.entry_price,4)}</td>
                      <td className="mono">{fmt(t.exit_price,4)}</td>
                      <td className={pips==null?'':pips>=0?'val-pos':'val-neg'}>{pips!=null?fmtPips(pips):'—'}</td>
                      <td className={pnl==null?'':pnl>=0?'val-pos':'val-neg'}>{pnl!=null?(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(0):'—'}</td>
                      <td className="mono val-dim">{held!=null?(held<60?`${held}m`:`${Math.floor(held/60)}h`):'—'}</td>
                      <td className="exit-reason">{t.exit_reason||t.close_reason||'—'}</td>
                      <td><span className="conv-tag">{conv!=null?fmt(conv,3):'—'}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* =====================================================
   TAB: AUDIT LOG
   ===================================================== */
function AuditTab({audit}) {
  const rows = audit || [];

  const dlCsv = () => {
    const hdrs = ['time','event','tag'];
    const lines = rows.map(a=>[a.time||'', `"${(a.event||'').replace(/"/g,'""')}"`, a.tag||''].join(','));
    const blob = new Blob([[hdrs.join(','),...lines].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='audit-log.csv';a.click();
  };

  return (
    <div className="panel">
      <div className="panel-hdr">
        <span className="panel-title">Audit Log</span>
        <button className="dl-btn" onClick={dlCsv}>↓ CSV</button>
      </div>
      {!rows.length ? (
        <div className="empty-state"><div className="em-icon">◌</div><span>No audit entries</span></div>
      ) : (
        rows.map((a,i) => (
          <div key={i} className="audit-row">
            <span className="audit-time">{a.time || relTime(a.created_at) || '—'}</span>
            <span className="audit-event">{a.event||a.message||a.description||JSON.stringify(a).slice(0,120)}</span>
            <span className={`audit-tag tag-${a.tag||'system'}`}>{(a.tag||'system').slice(0,8)}</span>
          </div>
        ))
      )}
    </div>
  );
}

/* =====================================================
   MAIN APP
   ===================================================== */
function App() {
  const tokenValid = () => {
    const t=getToken(); if (!t) return false;
    const p=parseJwt(t); return p && p.exp*1000 > Date.now();
  };
  const [authed,setAuthed] = useState(tokenValid);
  const [data,setData] = useState({
    stats:null, agents:[], convergence:[], signals:[], signals_full:[],
    decisions:[], currency_strength:[], learning:null, health:[],
    trades:[], open_positions:[], portfolio_exposure:null,
    alerts:[], system:{}, drawdown:[],
  });
  const [proposals,setProposals] = useState([]);
  const [activeTab,setActiveTab] = useState('overview');
  const [lastUpdated,setLastUpdated] = useState(null);
  const [refreshing,setRefreshing] = useState(false);

  const refresh = useCallback(async () => {
    setRefreshing(true);
    try {
      const eps=['/system/stats','/agents','/signals','/learning','/health','/trades/admin','/audit','/alerts','/providers','/proposals','/open-positions','/portfolio-exposure'];
      const results = await Promise.allSettled(eps.map(p=>apiFetch(p)));
      const val=i=>results[i].status==='fulfilled'?results[i].value:null;
      const [stats,agents,signals,learning,health,trades,audit,alerts,providers,propsRes,openPos,portExp]=eps.map((_,i)=>val(i));
      if (propsRes) setProposals(Array.isArray(propsRes)?propsRes:(propsRes.proposals||[]));
      setData(d=>({
        ...d,
        stats,
        agents:            agents??d.agents,
        convergence:       signals?.convergence??d.convergence,
        signals:           signals?.signals??d.signals,
        signals_full:      signals?.signals_full??d.signals_full,
        decisions:         signals?.decisions??d.decisions,
        currency_strength: signals?.currency_strength??d.currency_strength,
        learning:          learning??d.learning,
        health:            health??d.health,
        providers,
        trades:            trades??d.trades,
        audit:             audit??d.audit,
        alerts:            alerts?.alerts??d.alerts,
        system:            alerts?.system??d.system,
        drawdown:          alerts?.drawdown??d.drawdown,
        open_positions:    openPos??d.open_positions,
        portfolio_exposure:portExp??d.portfolio_exposure,
      }));
      setLastUpdated(new Date());
    } catch(e){console.error('Refresh error:',e);}
    finally {
      setRefreshing(false);
      const overlay=document.getElementById('app-loading');
      if (overlay){overlay.classList.add('fade-out');setTimeout(()=>overlay.remove(),300);}
    }
  }, []);

  useEffect(()=>{
    if (!authed){
      const overlay=document.getElementById('app-loading');
      if (overlay){overlay.classList.add('fade-out');setTimeout(()=>overlay.remove(),300);}
      return;
    }
    refresh();
    const id=setInterval(refresh,CONFIG.REFRESH_MS);
    return ()=>clearInterval(id);
  },[authed,refresh]);

  if (!authed) return <Login onAuth={()=>setAuthed(true)}/>;

  const {convergence,signals_full,decisions,currency_strength,learning,trades,open_positions,portfolio_exposure,audit}=data;

  return (
    <div>
      <Header data={data} lastUpdated={lastUpdated} onRefresh={refresh} refreshing={refreshing}/>
      <div className="dash">

        {/* TAB NAV */}
        <div className="tab-nav">
          {[
            ['overview',     'Overview'],
            ['observation',  'Agent Observation'],
            ['trades',       'Trades'],
            ['audit',        'Audit Log'],
          ].map(([key,lbl]) => (
            <button key={key} className={`tab-btn ${activeTab===key?'active':''}`} onClick={()=>setActiveTab(key)}>{lbl}</button>
          ))}
        </div>

        {/* OVERVIEW TAB */}
        {activeTab === 'overview' && (<>
          <div className="row row-3">
            <ConvergencePanel convergence={convergence} decisions={decisions}/>
            <CurrencyStrengthPanel currency_strength={currency_strength}/>
            <MacroSignalsPanel decisions={decisions} signals_full={signals_full} currency_strength={currency_strength}/>
          </div>
          <div className="row row-6040">
            <OpenPositionsPanel openPositions={open_positions}/>
            <PortfolioExposurePanel portfolio_exposure={portfolio_exposure} openPositions={open_positions}/>
          </div>
          <div className="row row-3">
            <TechnicalSignalsPanel signals_full={signals_full} decisions={decisions}/>
            <LearningPanel learning={learning} proposals={proposals}/>
            <RegimeStressPanel decisions={decisions} signals_full={signals_full}/>
          </div>
          <div className="row row-1">
            <RecentTradesPanel trades={trades}/>
          </div>
        </>)}

        {/* AGENT OBSERVATION TAB */}
        {activeTab === 'observation' && (
          <ObservationTab signals_full={signals_full} decisions={decisions}/>
        )}

        {/* TRADES TAB */}
        {activeTab === 'trades' && (
          <TradesTab trades={trades} openPositions={open_positions}/>
        )}

        {/* AUDIT LOG TAB */}
        {activeTab === 'audit' && (
          <AuditTab audit={audit}/>
        )}

      </div>
    </div>
  );
}

/* =====================================================
   SESSION INACTIVITY — 10 min timeout, 60s countdown warning
   ===================================================== */
const INACTIVITY_MS = 10 * 60 * 1000;  // 10 minutes
const WARNING_MS    = 60 * 1000;        // 60-second warning period

let _inactivityTimer = null;
let _countdownInterval = null;

function _forceLogout() {
  clearInterval(_countdownInterval);
  clearAuth();
  window.location.reload();
}

function _hideWarning() {
  const m = document.getElementById('session-modal');
  if (m) m.classList.remove('show');
  clearInterval(_countdownInterval);
  _countdownInterval = null;
}

function _showWarning() {
  const m = document.getElementById('session-modal');
  const el = document.getElementById('session-countdown');
  if (!m || !el) { _forceLogout(); return; }
  let secs = Math.round(WARNING_MS / 1000);
  el.textContent = secs;
  m.classList.add('show');
  clearInterval(_countdownInterval);
  _countdownInterval = setInterval(() => {
    secs--;
    el.textContent = secs;
    if (secs <= 0) { clearInterval(_countdownInterval); _forceLogout(); }
  }, 1000);
}

function resetSessionTimer() {
  _hideWarning();
  clearTimeout(_inactivityTimer);
  _inactivityTimer = setTimeout(_showWarning, INACTIVITY_MS - WARNING_MS);
}

// On page load: check token expiry immediately
(function checkTokenOnLoad() {
  const p = parseJwt(getToken());
  if (!p || p.exp * 1000 < Date.now()) {
    clearAuth();
    // Don't reload — React will render Login on authed=false
  }
})();

['mousemove','mousedown','keydown','click','touchstart','scroll'].forEach(e =>
  document.addEventListener(e, resetSessionTimer, {passive: true})
);
resetSessionTimer();

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
