<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Neo — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" onload="window.QRCodeReady=true" onerror="window.QRCodeFailed=true"></script>
<script>/* Apply saved theme before React runs — prevents loading overlay colour mismatch */
(function(){var t=localStorage.getItem('neo-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }

  :root {
    --bg:        #F9F8F6;
    --surface:   #FFFFFF;
    --surface-2: #F3F2EF;
    --border:    rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.13);
    --text-1:    #1A1917;
    --text-2:    #5C5A56;
    --text-3:    #9B9892;
    --green:     #2D6A4F;
    --green-bg:  #D8F3DC;
    --red:       #9B2226;
    --red-bg:    #FFE8E8;
    --amber:     #854D0E;
    --amber-bg:  #FEF3C7;
    --blue:      #1E40AF;
    --blue-bg:   #DBEAFE;
    --radius:    10px;
    --radius-sm: 6px;
    --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
  }
  [data-theme="dark"] {
    --bg:        #0f1117;
    --surface:   #181c25;
    --surface-2: #1e2330;
    --border:    rgba(255,255,255,0.07);
    --border-md: rgba(255,255,255,0.12);
    --text-1:    #eceef2;
    --text-2:    #9aa0b0;
    --text-3:    #555e72;
    --green:     #4ade80;
    --green-bg:  rgba(74,222,128,0.12);
    --red:       #f87171;
    --red-bg:    rgba(248,113,113,0.12);
    --amber:     #fbbf24;
    --amber-bg:  rgba(251,191,36,0.12);
    --blue:      #60a5fa;
    --blue-bg:   rgba(96,165,250,0.12);
    --shadow:    0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  }
  .theme-toggle { background: none; border: 1px solid var(--border-md); border-radius: var(--radius-sm); padding: 4px 8px; cursor: pointer; font-size: 0.78rem; color: var(--text-3); line-height: 1; transition: color 0.15s, background 0.15s; }
  .theme-toggle:hover { color: var(--text-1); background: var(--surface-2); }

  body { background: var(--bg); color: var(--text-1); font-family: var(--font); font-weight: 400; line-height: 1.5; min-height: 100vh; }
  .app { max-width: 1080px; margin: 0 auto; padding: 0 1.25rem 3rem; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.75rem; }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .wordmark { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
  .admin-pill { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; background: var(--blue-bg); color: var(--blue); }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .clock { font-family: var(--mono); font-size: 0.8rem; color: var(--text-3); }
  .logout-btn { font-size: 0.75rem; color: var(--text-3); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm); transition: color 0.15s, background 0.15s; }
  .logout-btn:hover { color: var(--text-1); background: var(--surface-2); }

  .sec-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.6rem; }
  .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.1rem 1.2rem; margin-bottom: 1.25rem; }
  .div { height: 1px; background: var(--border); margin: 0.75rem 0; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 24px; margin-bottom: 1.25rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1rem; margin-bottom: 1.25rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }

  /* Stat cards */
  .stat-card { background: var(--surface-2); border-radius: var(--radius-sm); padding: 0.75rem 0.9rem; }
  .stat-card .lbl { font-size: 0.7rem; color: var(--text-3); margin-bottom: 3px; }
  .stat-card .val { font-size: 1.1rem; font-weight: 500; font-family: var(--mono); color: var(--text-1); }
  .stat-card .sub { font-size: 0.68rem; color: var(--text-3); margin-top: 2px; }

  /* Agent rows */
  .agent-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .agent-row:first-child { padding-top: 0; }
  .agent-row:last-child { border-bottom: none; padding-bottom: 0; }
  .agent-name { font-size: 0.85rem; font-weight: 500; }
  .agent-meta { font-size: 0.7rem; color: var(--text-3); margin-top: 2px; font-family: var(--mono); }
  .agent-right { display: flex; align-items: center; gap: 0.65rem; }
  .cycle-lbl { font-size: 0.7rem; color: var(--text-3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #16A34A; }
  .dot-amber { background: #D97706; }
  .dot-red   { background: #DC2626; }

  /* Convergence bars */
  .conv-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
  .conv-row:last-child { border-bottom: none; }
  .conv-right { display: flex; align-items: center; gap: 0.65rem; flex: 1; max-width: 55%; }
  .conv-track { flex: 1; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .conv-fill { height: 4px; border-radius: 2px; transition: width 0.4s ease; }
  .conv-val { font-family: var(--mono); font-size: 0.75rem; font-weight: 500; min-width: 34px; text-align: right; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neut { color: var(--text-3); }

  /* Signal rows */
  .signal-row { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 0; border-bottom: 1px solid var(--border); }
  .signal-row:first-child { padding-top: 0; }
  .signal-row:last-child { border-bottom: none; padding-bottom: 0; }
  .signal-pair { font-size: 0.85rem; font-weight: 500; }
  .signal-agents { font-size: 0.68rem; color: var(--text-3); margin-top: 1px; }
  .signal-right { display: flex; align-items: center; gap: 0.5rem; }
  .score { font-family: var(--mono); font-size: 0.75rem; font-weight: 500; min-width: 34px; text-align: right; }
  /* ── Signals panel — pair-grouped ── */
  .pair-group { border-bottom:1px solid var(--border); }
  .pair-group:last-child { border-bottom:none; }
  .pair-group-header { display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0; cursor:pointer; user-select:none; }
  .pair-group-left { display:flex; align-items:center; gap:0.35rem; }
  .pair-group-chevron { font-size:0.58rem; color:var(--text-3); width:12px; flex-shrink:0; line-height:1; }
  .agent-subrows { padding-bottom:0.3rem; }
  .agent-subrow { display:flex; align-items:center; justify-content:space-between; padding:0.26rem 0 0.26rem 1.1rem; }
  .agent-subrow-left { display:flex; align-items:center; gap:0.45rem; flex:1; min-width:0; }
  .agent-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .agent-subrow-name { font-size:0.72rem; color:var(--text-2); min-width:78px; text-transform:capitalize; }
  .agent-subrow-time { font-size:0.63rem; color:var(--text-3); font-family:var(--mono); }
  .agent-mini-bar { width:36px; height:4px; background:var(--surface-2); border-radius:2px; overflow:hidden; flex-shrink:0; }
  .bias-badge { font-size: 0.65rem; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
  .bias-bull { background: var(--green-bg); color: var(--green); }
  .bias-bear { background: var(--red-bg); color: var(--red); }
  .bias-neut { background: var(--surface-2); color: var(--text-3); }

  /* API health */
  .api-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0.75rem; }
  .api-item { display: flex; align-items: center; gap: 0.5rem; }
  .api-name { font-size: 0.78rem; color: var(--text-2); }
  .api-detail { font-size: 0.65rem; color: var(--text-3); }

  /* Learning module */
  .learn-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 0.9rem 1rem; height: 100%; box-sizing: border-box; word-break: normal; overflow-wrap: normal; }
  .learn-title { font-size: 0.8rem; font-weight: 500; margin-bottom: 2px; }
  .learn-sub { font-size: 0.7rem; color: var(--text-3); margin-bottom: 0.75rem; }
  .empty-state { text-align: center; padding: 0.75rem 0.5rem; }
  .empty-val { font-size: 1.75rem; font-weight: 500; color: var(--text-3); margin-bottom: 4px; font-family: var(--mono); }
  .empty-lbl { font-size: 0.75rem; color: var(--text-3); margin-bottom: 3px; }
  .empty-hint { font-size: 0.68rem; color: var(--text-3); opacity: 0.7; }
  .accuracy-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
  .accuracy-row:first-child { padding-top: 0; }
  .accuracy-row:last-child { border-bottom: none; padding-bottom: 0; }
  .acc-agent { font-size: 0.72rem; font-weight: 500; }
  .acc-trades { font-size: 0.68rem; color: var(--text-3); margin-top: 1px; }
  .acc-right { display: flex; align-items: center; gap: 0.5rem; }
  .acc-bar { width: 72px; height: 3px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .acc-fill { height: 3px; border-radius: 2px; }
  .acc-val { font-family: var(--mono); font-size: 0.72rem; font-weight: 500; min-width: 30px; text-align: right; }
  .learn-note { font-size: 0.68rem; color: var(--text-3); margin-top: 0.65rem; padding-top: 0.65rem; border-top: 1px solid var(--border); line-height: 1.4; }
  .failure-row { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
  .failure-row:first-child { padding-top: 0; }
  .failure-row:last-child { border-bottom: none; padding-bottom: 0; }
  .failure-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .failure-mode { font-size: 0.72rem; font-weight: 500; }
  .failure-count { font-size: 0.68rem; color: var(--text-3); }
  .failure-track { width: 100%; height: 2px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .failure-fill { height: 2px; border-radius: 2px; background: var(--red); }

  /* Trade history */
  .trade-row { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
  .trade-row:first-child { padding-top: 0; }
  .trade-row:last-child { border-bottom: none; padding-bottom: 0; }
  .trade-pair { font-weight: 500; min-width: 62px; }
  .dir-badge { font-size: 0.62rem; font-weight: 500; padding: 2px 6px; border-radius: 10px; }
  .dir-long  { background: var(--green-bg); color: var(--green); }
  .dir-short { background: var(--red-bg);   color: var(--red);   }
  .trade-time { color: var(--text-3); font-family: var(--mono); font-size: 0.68rem; min-width: 60px; }
  .trade-context { color: var(--text-3); font-size: 0.68rem; flex: 1; padding: 0 0.5rem; }
  .trade-pnl { font-family: var(--mono); font-weight: 500; text-align: right; min-width: 48px; }

  /* Audit log */
  .log-row { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
  .log-row:first-child { padding-top: 0; }
  .log-row:last-child { border-bottom: none; padding-bottom: 0; }
  .log-time { font-family: var(--mono); font-size: 0.68rem; color: var(--text-3); min-width: 54px; flex-shrink: 0; }
  .log-event { color: var(--text-1); flex: 1; font-size: 0.78rem; }
  .log-tag { font-size: 0.62rem; font-weight: 500; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
  .tag-trade  { background: var(--green-bg); color: var(--green); }
  .tag-signal { background: var(--blue-bg);  color: var(--blue);  }
  .tag-risk   { background: #FEE2E2; color: #991B1B; }
  .tag-system { background: var(--surface-2); color: var(--text-3); }

  /* Admin performance panel */
  .perf-presets { display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
  .preset-btn { font-size:0.72rem; font-weight:500; font-family:var(--font); padding:4px 10px; border-radius:20px; border:1px solid var(--border-md); background:var(--surface-2); color:var(--text-2); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .preset-btn:hover { background:var(--border); color:var(--text-1); }
  .preset-btn.active { background:var(--text-1); color:#fff; border-color:var(--text-1); }
  .date-input { font-size:0.72rem; font-family:var(--mono); padding:4px 8px; border-radius:var(--radius-sm); border:1px solid var(--border-md); background:var(--surface-2); color:var(--text-1); outline:none; }
  .date-sep { font-size:0.72rem; color:var(--text-3); }
  /* Per-user comparison table */
  .perf-comparison { width:100%; border-collapse:collapse; font-size:0.78rem; margin-bottom:0.75rem; }
  .perf-comparison th { text-align:left; font-size:0.65rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-3); padding:0.4rem 0.6rem; border-bottom:2px solid var(--border-md); }
  .perf-comparison td { padding:0.5rem 0.6rem; border-bottom:1px solid var(--border); }
  .perf-comparison tr:last-child td { border-bottom:none; }
  .perf-comparison tr.total-row td { border-top:2px solid var(--border-md); font-weight:500; background:var(--surface-2); }
  .profile-badge { font-size:0.62rem; font-weight:500; padding:2px 6px; border-radius:8px; white-space:nowrap; }
  .profile-conservative { background:#EEF2FF; color:#3730A3; }
  .profile-balanced     { background:var(--blue-bg); color:var(--blue); }
  .profile-aggressive   { background:var(--amber-bg); color:var(--amber); }

  /* Download buttons */
  .dl-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 500; color: var(--text-2); background: var(--surface-2); border: 1px solid var(--border-md); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; text-decoration: none; transition: background 0.15s; font-family: var(--font); }
  .dl-btn:hover { background: var(--border); }
  .dl-btn-primary { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 500; color: var(--blue); background: var(--blue-bg); border: 1px solid #BFDBFE; border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; text-decoration: none; transition: opacity 0.15s; font-family: var(--font); }
  .dl-btn-primary:hover { opacity: 0.85; }
  .dl-group { display: flex; align-items: center; gap: 0.5rem; }
  .forensic-note { font-size: 0.68rem; color: var(--text-3); margin-bottom: 0.65rem; line-height: 1.5; }

  /* Login */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center; }
  .login-title { font-size: 1rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.35rem; }
  .login-sub { font-size: 0.8rem; color: var(--text-3); margin-bottom: 1.75rem; }
  /* Input: explicit fill colour + autofill reset to defeat browser dark-mode injection */
  .login-input { width: 100%; padding: 0.65rem 0.85rem; font-size: 0.85rem; font-family: var(--font); border: 1px solid var(--border-md); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text-1); -webkit-text-fill-color: var(--text-1); margin-bottom: 0.65rem; outline: none; transition: border 0.15s; }
  .login-input::placeholder { color: var(--text-3); opacity: 1; }
  .login-input:focus { border-color: var(--text-2); }
  .login-input:-webkit-autofill,
  .login-input:-webkit-autofill:hover,
  .login-input:-webkit-autofill:focus { transition: background-color 9999s ease-in-out 0s; }
  /* Dark mode: hardcoded values override any browser colour-scheme interference */
  [data-theme="dark"] .login-input { background: #1e2330; color: #eceef2; -webkit-text-fill-color: #eceef2; border-color: rgba(255,255,255,0.12); }
  [data-theme="dark"] .login-input::placeholder { color: rgba(236,238,242,0.35); opacity: 1; }
  [data-theme="dark"] .login-input:focus { border-color: rgba(255,255,255,0.28); }
  [data-theme="dark"] .login-input:-webkit-autofill,
  [data-theme="dark"] .login-input:-webkit-autofill:hover,
  [data-theme="dark"] .login-input:-webkit-autofill:focus { -webkit-box-shadow: 0 0 0 1000px #1e2330 inset; -webkit-text-fill-color: #eceef2; }
  /* Button: var(--bg) for text colour so contrast inverts correctly in both modes.
     Light: #F9F8F6 text on #1A1917 bg ✓   Dark: #0f1117 text on #eceef2 bg ✓ */
  .login-btn { width: 100%; padding: 0.7rem; font-size: 0.85rem; font-weight: 500; font-family: var(--font); background: var(--text-1); color: var(--bg); border: none; border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem; }
  .login-btn:hover:not(:disabled) { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .login-err { font-size: 0.75rem; color: var(--red); margin-top: 0.65rem; }

  .loading-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border-md); border-top-color: var(--text-2); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Alerts panel ── */
  .alert-item { display:flex; align-items:flex-start; gap:0.75rem; padding:0.65rem 0; border-bottom:1px solid var(--border); }
  .alert-item:last-child { border-bottom:none; padding-bottom:0; }
  .alert-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .alert-dot.critical { background:var(--red); box-shadow:0 0 6px rgba(155,34,38,0.4); }
  .alert-dot.high { background:#D97706; }
  .alert-dot.medium { background:var(--blue); }
  .alert-title { font-size:0.8rem; font-weight:500; margin-bottom:2px; }
  .alert-detail { font-size:0.72rem; color:var(--text-3); }
  .alert-time { font-size:0.68rem; color:var(--text-3); font-family:var(--mono); white-space:nowrap; margin-left:auto; padding-left:0.75rem; }
  .alert-badge { font-size:0.62rem; font-weight:500; padding:2px 7px; border-radius:8px; white-space:nowrap; margin-bottom:3px; display:inline-block; }
  .alert-badge.critical { background:var(--red-bg); color:var(--red); }
  .alert-badge.high { background:var(--amber-bg); color:var(--amber); }
  .alert-badge.medium { background:var(--blue-bg); color:var(--blue); }

  /* ── System state bar ── */
  .sys-bar { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.85rem; border-radius:var(--radius-sm); font-size:0.78rem; font-weight:500; margin-bottom:1rem; border:1px solid transparent; }
  .dot-grey  { background: var(--text-3) !important; opacity:0.4; }
  .sys-bar.healthy { background:var(--green-bg); color:var(--green); border-color:rgba(45,106,79,0.15); }
  .sys-bar.warning { background:var(--amber-bg); color:var(--amber); border-color:rgba(133,77,14,0.15); }
  .sys-bar.critical { background:var(--red-bg); color:var(--red); border-color:rgba(155,34,38,0.15); }

  /* ── Kill Switch UI ── */
  .ks-bar { display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0; margin-bottom:1rem; border-bottom:1px solid var(--border); }
  .ks-bar.ks-active { background:var(--red-bg); padding:0.5rem 0.85rem; border-radius:var(--radius-sm); border:1px solid rgba(155,34,38,0.25); animation:ks-pulse 2s ease-in-out infinite; }
  .ks-bar.ks-resuming { background:var(--amber-bg); padding:0.5rem 0.85rem; border-radius:var(--radius-sm); border:1px solid rgba(133,77,14,0.15); }

function parseJwt(token) { try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return null; } }
function isTokenValid(t) { const p = parseJwt(t); return p ? p.exp*1000 > Date.now() : false; }

  const refreshToken = localStorage.getItem('neo_admin_refresh');

    const res = await fetch('https://cognito-idp.eu-west-2.amazonaws.com/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-amz-json-1.1',
        'X-Amz-Target': 'AWSCognitoIdentityProviderService.InitiateAuth',
      },
      body: JSON.stringify({
        ClientId: CONFIG.CLIENT_ID,
        AuthFlow: 'REFRESH_TOKEN_AUTH',
        AuthParameters: { REFRESH_TOKEN: refreshToken },
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.AuthenticationResult) return false;
    localStorage.setItem('neo_admin_token', data.AuthenticationResult.IdToken);
    return true;
  } catch { return false; }
}

async function apiFetch(path) {
  if (CONFIG.MOCK_MODE) return null;
  // Proactively refresh if token is expired (or nearly so — within 60s)
  const p = parseJwt(getToken());
  if (!p || p.exp * 1000 < Date.now() + 60000) {
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
  }
  const res = await fetch(`${CONFIG.API_BASE}${path}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
  if (res.status === 401) {
    // Token was rejected — try one refresh then retry
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
    const retry = await fetch(`${CONFIG.API_BASE}${path}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (!retry.ok) throw new Error(`API ${path} failed: ${retry.status}`);
    return retry.json();
  }
  if (!res.ok) throw new Error(`API ${path} failed: ${res.status}`);
  return res.json();
}

async function apiPost(path, body) {
  if (CONFIG.MOCK_MODE) return null;
  const p = parseJwt(getToken());
  if (!p || p.exp * 1000 < Date.now() + 60000) {
    const ok = await tryRefreshToken();
    if (!ok) { clearAuth(); window.location.reload(); return null; }
  }
  const res = await fetch(`${CONFIG.API_BASE}${path}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || `API ${path} failed: ${res.status}`);
  return json;
}

function AgentSubRow({ signal }) {
  const dotColor = AGENT_COLORS[signal.agent_name] || 'var(--text-3)';
  const agentLbl = (signal.agent_name || '').replace(/_/g, ' ');
  const timeStr  = relTime(signal.created_at);

  // Regime: show trend classification, not directional bias
  if (signal.agent_name === 'regime') {
    const regimeVal = signal.payload?.regime || '—';
    const adx = signal.payload?.adx != null ? Number(signal.payload.adx).toFixed(1) : null;
    const isTrending = regimeVal === 'trending';
    const isHighVol  = regimeVal === 'high_volatility';
    const isLowVol   = regimeVal === 'low_volatility';
    const regimeBg    = isTrending ? 'var(--blue-bg)'  : isHighVol ? 'var(--red-bg)'  : isLowVol ? 'var(--green-bg)' : 'var(--surface-2)';
    const regimeColor = isTrending ? 'var(--blue)'     : isHighVol ? 'var(--red)'     : isLowVol ? 'var(--green)'   : 'var(--text-3)';
    return (
      <div className="agent-subrow">
        <div className="agent-subrow-left">
          <div className="agent-dot" style={{background: dotColor}} />
          <span className="agent-subrow-name">{agentLbl}</span>
          <span className="agent-subrow-time">{timeStr}</span>
        </div>
        <div className="signal-right">
          <span style={{fontSize:'0.65rem',padding:'1px 7px',borderRadius:'6px',fontWeight:500,background:regimeBg,color:regimeColor,textTransform:'capitalize'}}>
            {regimeVal.replace(/_/g,' ')}
          </span>
          {adx && <span style={{fontFamily:'var(--mono)',fontSize:'0.65rem',color:'var(--text-3)'}}>ADX {adx}</span>}
        </div>
      </div>
    );
  }

  const s = signal.score || 0;
  const abs = Math.abs(s);
  const scoreCls = abs >= CONV_THRESHOLD ? (s >= 0 ? 'pos' : 'neg') : 'neut';
  const bias = signal.bias || 'neutral';
  const biasCls = bias === 'bullish' ? 'bull' : bias === 'bearish' ? 'bear' : 'neut';
  const miniColor = biasCls === 'bull' ? '#22c55e' : biasCls === 'bear' ? '#ef4444' : '#64748b';
  return (
    <div className="agent-subrow">
      <div className="agent-subrow-left">
        <div className="agent-dot" style={{background: dotColor}} />
        <span className="agent-subrow-name">{agentLbl}</span>
        <span className="agent-subrow-time">{timeStr}</span>
      </div>
      <div className="signal-right">
        <span className={`bias-badge bias-${biasCls}`}>{bias.charAt(0).toUpperCase()+bias.slice(1)}</span>
        <div className="agent-mini-bar">
          <div style={{width:`${Math.min(abs,1)*100}%`,height:'100%',background:miniColor,borderRadius:2}} />
        </div>
        <span className={`score ${scoreCls}`}>{s >= 0 ? '+' : ''}{s.toFixed(2)}</span>
      </div>
    </div>
  );
}

function PairGroup({ group, expanded, onToggle }) {
  const { pair, agentSignals, weightedScore, bias } = group;
  const abs      = Math.abs(weightedScore);
  const scoreCls = abs >= CONV_THRESHOLD ? (weightedScore >= 0 ? 'pos' : 'neg') : 'neut';
  const biasBadge = bias === 'bull' ? 'Bullish' : bias === 'bear' ? 'Bearish' : 'Neutral';
  // Sort: regime first, then macro, then technical
  const AGENT_ORDER = ['regime','macro','technical'];
  const sorted = [...agentSignals].sort((a,b) => {
    const ai = AGENT_ORDER.indexOf(a.agent_name), bi = AGENT_ORDER.indexOf(b.agent_name);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  return (
    <div className="pair-group">
      <div className="pair-group-header" onClick={onToggle}>
        <div className="pair-group-left">
          <span className="pair-group-chevron">{expanded ? '▾' : '▸'}</span>
          <span className="signal-pair">{pair}</span>
        </div>
        <div className="signal-right">
          <span className={`bias-badge bias-${bias}`}>{biasBadge}</span>
          <span className={`score ${scoreCls}`}>{weightedScore >= 0 ? '+' : ''}{weightedScore.toFixed(2)}</span>
        </div>
      </div>
      {expanded && (
        <div className="agent-subrows">
          {sorted.map((s, i) => <AgentSubRow key={i} signal={s} />)}
        </div>
      )}
    </div>
  );
}

function SignalsPanel({ signals_full, pairGroup }) {
  const PAIR_ORDER = [
    'EUR/USD','GBP/USD','USD/JPY','USD/CHF','AUD/USD','USD/CAD','NZD/USD',
    'EUR/GBP','EUR/JPY','GBP/JPY','EUR/CHF','GBP/CHF','EUR/AUD','GBP/AUD',
    'EUR/CAD','GBP/CAD','AUD/NZD','AUD/JPY','CAD/JPY','NZD/JPY',
  ];
  // Group per-pair signals by pair (exclude null-pair global signals)
  const groupMap = {};
  (signals_full || []).forEach(s => {
    if (!s.pair || !['macro','technical','regime'].includes(s.agent_name)) return;
    if (pairGroup && !pairGroup.includes(s.instrument)) return;
    if (!groupMap[s.pair]) groupMap[s.pair] = [];
    // Deduplicate: keep one row per agent per pair (highest |score|)
    const existing = groupMap[s.pair].find(x => x.agent_name === s.agent_name);
    if (!existing || Math.abs(s.score) > Math.abs(existing.score)) {
      if (existing) groupMap[s.pair] = groupMap[s.pair].filter(x => x.agent_name !== s.agent_name);
      groupMap[s.pair].push(s);
    }
  });

  const groups = Object.entries(groupMap).map(([pair, items]) => {
    const dirItems = items.filter(x => x.agent_name !== 'regime');
    const weightedScore = dirItems.length
      ? dirItems.reduce((a, b) => a + (b.score || 0), 0) / dirItems.length
      : 0;
    const bullCt = dirItems.filter(x => x.bias === 'bullish').length;
    const bearCt = dirItems.filter(x => x.bias === 'bearish').length;
    const bias = bullCt > bearCt ? 'bull' : bearCt > bullCt ? 'bear' : 'neut';
    return { pair, agentSignals: items, weightedScore, bias };
  });

  groups.sort((a, b) => {
    const pi = PAIR_ORDER.indexOf(a.pair), pj = PAIR_ORDER.indexOf(b.pair);
    return (pi === -1 ? 99 : pi) - (pj === -1 ? 99 : pj);
  });

  const [expanded, setExpanded] = useState(() => {
    const init = {};
    groups.slice(0, 3).forEach(g => { init[g.pair] = true; });
    return init;
  });

  const toggle = pair => setExpanded(e => ({ ...e, [pair]: !e[pair] }));

  if (!signals_full) return <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>Loading…</div>;
  if (groups.length === 0) return <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>No signals yet — waiting for agent cycle</div>;

  const USD_PAIRS = ['EUR/USD','GBP/USD','USD/JPY','USD/CHF','AUD/USD','USD/CAD','NZD/USD'];
  // Build rendered list with section dividers
  const renderedGroups = [];
  let usdHeaderAdded = false;
  let crossHeaderAdded = false;
  groups.forEach(g => {
    if (!pairGroup) {
      const isUsd = USD_PAIRS.includes(g.pair);
      if (isUsd && !usdHeaderAdded) {
        renderedGroups.push(<div key="hdr-usd" className="sig-section-label">USD Pairs</div>);
        usdHeaderAdded = true;
      } else if (!isUsd && !crossHeaderAdded) {
        renderedGroups.push(<div key="hdr-cross" className="sig-section-label">Cross Pairs</div>);
        crossHeaderAdded = true;
      }
    }
    const isNeutral = g.weightedScore === 0 || Math.abs(g.weightedScore) < 0.01;
    renderedGroups.push(
      <div key={g.pair} className={isNeutral ? "sig-row-neutral" : undefined}>
        <PairGroup group={g} expanded={!!expanded[g.pair]} onToggle={() => toggle(g.pair)} />
      </div>
    );
  });

  return (
    <div>
      {renderedGroups}
    </div>
  );
}

// ─────────────────────────────────────────────
const TIMEOUT_MS = 10 * 60 * 1000;
const WARNING_MS =  9 * 60 * 1000;
let inactivityTimer = null;
let warningTimer    = null;

function showSessionWarning() {
  const el = document.getElementById('neo-session-warning');
  if (el) el.style.display = 'flex';
}
function hideSessionWarning() {
  const el = document.getElementById('neo-session-warning');
  if (el) el.style.display = 'none';
}
function expireSession() {
  stopInactivityTimer();
  clearAuth();
  localStorage.setItem('neo_session_timeout', '1');
  window.location.reload();
}
function resetTimers() {
  clearTimeout(inactivityTimer);
  clearTimeout(warningTimer);
  hideSessionWarning();
  warningTimer    = setTimeout(showSessionWarning, WARNING_MS);
  inactivityTimer = setTimeout(expireSession, TIMEOUT_MS);
}
function startInactivityTimer() {
  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(ev => {
    document.addEventListener(ev, resetTimers, { passive: true });
  });
  resetTimers();
}
function stopInactivityTimer() {
  clearTimeout(inactivityTimer);
  clearTimeout(warningTimer);
  hideSessionWarning();
  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(ev => {
    document.removeEventListener(ev, resetTimers);
  });
  inactivityTimer = null;
  warningTimer    = null;
}

function LoginScreen({ onLogin }) {
  const [stage, setStage] = useState('signin');
  const [username, setUsername] = useState('');
  const [pass, setPass] = useState('');
  const [newPass, setNewPass] = useState('');
  const [newPass2, setNewPass2] = useState('');
  const [session, setSession] = useState('');
  const [mfaCode, setMfaCode] = useState('');
  const [mfaSecret, setMfaSecret] = useState('');
  const [qrCopied, setQrCopied] = useState(false);
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  // QR code generation — polls for QRCode library ready; cleanup returned to useEffect.
  useEffect(() => {
    if (stage !== 'mfasetup' || !mfaSecret || !username) return;
    const uri = `otpauth://totp/ALGODESK:${encodeURIComponent(username)}?secret=${mfaSecret}&issuer=ALGODESK&algorithm=SHA1&digits=6&period=30`;
    let pollId;
    const tryRender = () => {
      const container = document.getElementById('totp-qr-container');
      if (!container) return false;
      if (typeof QRCode === 'undefined') return false;
      try {
        container.innerHTML = '';
        new QRCode(container, { text: uri, width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff' });
      } catch(err) {
        console.error('QR generation failed:', err);
        container.innerHTML = '<p style="font-size:0.78rem;color:var(--text-3);margin:0.5rem 0">QR unavailable — use the code below</p>';
      }
      return true;
    };
    if (!tryRender()) {
      let attempts = 0;
      pollId = setInterval(() => {
        attempts++;
        const done = tryRender();
        const giveUp = attempts >= 30 || window.QRCodeFailed;
        if (done || giveUp) {
          clearInterval(pollId);
          if (!done) {
            const c = document.getElementById('totp-qr-container');
            if (c) c.innerHTML = '<p style="font-size:0.78rem;color:var(--text-3);margin:0.5rem 0">Use the code below to set up manually</p>';
          }
        }
      }, 200);
    }
    return () => { if (pollId) clearInterval(pollId); };
  }, [stage, mfaSecret, username]);

  const handleSecretCopy = () => {
    navigator.clipboard.writeText(mfaSecret).then(() => {
      setQrCopied(true);
      setTimeout(() => setQrCopied(false), 2000);
    });
  };

  useEffect(() => {
    const timedOut = localStorage.getItem('neo_session_timeout');
    if (timedOut) {
      setErr('Session expired after 10 minutes of inactivity. Please sign in again.');
      localStorage.removeItem('neo_session_timeout');
    }
  }, []);

  const IDP_URL = 'https://cognito-idp.eu-west-2.amazonaws.com/';

  const cognitoCall = async (target, body) => {
    const res = await fetch(IDP_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-amz-json-1.1',
        'X-Amz-Target': 'AWSCognitoIdentityProviderService.' + target,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || data.__type || ('HTTP ' + res.status));
    return data;
  };

  const finalizeLogin = (authResult) => {
    localStorage.setItem('neo_admin_token', authResult.IdToken);
    if (authResult.RefreshToken) localStorage.setItem('neo_admin_refresh', authResult.RefreshToken);
    localStorage.setItem('neo_admin_user', username);
    startInactivityTimer();
    onLogin();
  };

  const handleSubmit = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      if (CONFIG.MOCK_MODE) {
        localStorage.setItem('neo_admin_token', 'mock_admin_token');
        localStorage.setItem('neo_admin_user', username || 'admin');
        startInactivityTimer(); onLogin(); return;
      }
      const data = await cognitoCall('InitiateAuth', {
        ClientId: CONFIG.CLIENT_ID,
        AuthFlow: 'USER_PASSWORD_AUTH',
        AuthParameters: { USERNAME: username, PASSWORD: pass },
      });
      if (data.ChallengeName === 'NEW_PASSWORD_REQUIRED') {
        setSession(data.Session);
        setStage('newpass');
      } else if (data.ChallengeName === 'SOFTWARE_TOKEN_MFA') {
        setSession(data.Session);
        setStage('totp');
      } else if (data.ChallengeName === 'MFA_SETUP') {
        const assoc = await cognitoCall('AssociateSoftwareToken', { Session: data.Session });
        setMfaSecret(assoc.SecretCode);
        setSession(assoc.Session);
        setStage('mfasetup');
      } else if (data.AuthenticationResult) {
        finalizeLogin(data.AuthenticationResult);
      } else {
        throw new Error('Unexpected challenge: ' + (data.ChallengeName || 'unknown'));
      }
    } catch(e) { setErr(e.message || 'Login failed'); }
    finally { setLoading(false); }
  };

  const handleNewPass = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      if (newPass !== newPass2) throw new Error('Passwords do not match');
      const data = await cognitoCall('RespondToAuthChallenge', {
        ClientId: CONFIG.CLIENT_ID,
        ChallengeName: 'NEW_PASSWORD_REQUIRED',
        Session: session,
        ChallengeResponses: { USERNAME: username, NEW_PASSWORD: newPass },
      });
      if (data.AuthenticationResult) {
        finalizeLogin(data.AuthenticationResult);
      } else if (data.ChallengeName === 'SOFTWARE_TOKEN_MFA') {
        setSession(data.Session);
        setStage('totp');
      } else if (data.ChallengeName === 'MFA_SETUP') {
        const assoc = await cognitoCall('AssociateSoftwareToken', { Session: data.Session });
        setMfaSecret(assoc.SecretCode);
        setSession(assoc.Session);
        setStage('mfasetup');
      } else {
        throw new Error('Unexpected challenge: ' + (data.ChallengeName || 'unknown'));
      }
    } catch(e) { setErr(e.message || 'Password change failed'); }
    finally { setLoading(false); }
  };

  const handleTotp = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const data = await cognitoCall('RespondToAuthChallenge', {
        ClientId: CONFIG.CLIENT_ID,
        ChallengeName: 'SOFTWARE_TOKEN_MFA',
        Session: session,
        ChallengeResponses: { USERNAME: username, SOFTWARE_TOKEN_MFA_CODE: mfaCode },
      });
      if (data.AuthenticationResult) {
        finalizeLogin(data.AuthenticationResult);
      } else {
        throw new Error('Unexpected challenge: ' + (data.ChallengeName || 'unknown'));
      }
    } catch(e) { setErr(e.message || 'MFA verification failed'); }
    finally { setLoading(false); }
  };

  const handleMfaSetup = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const verified = await cognitoCall('VerifySoftwareToken', {
        Session: session,
        UserCode: mfaCode,
      });
      const data = await cognitoCall('RespondToAuthChallenge', {
        ClientId: CONFIG.CLIENT_ID,
        ChallengeName: 'MFA_SETUP',
        Session: verified.Session,
        ChallengeResponses: { USERNAME: username },
      });
      if (data.AuthenticationResult) {
        finalizeLogin(data.AuthenticationResult);
      } else if (data.ChallengeName === 'SOFTWARE_TOKEN_MFA') {
        setSession(data.Session);
        setMfaCode('');
        setStage('totp');
      } else {
        throw new Error('Unexpected challenge after MFA setup: ' + (data.ChallengeName || 'unknown'));
      }
    } catch(e) { setErr(e.message || 'MFA setup failed'); }
    finally { setLoading(false); }
  };

  if (stage === 'totp') {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-title">Two-factor authentication</div>
          <div className="login-sub">Enter the 6-digit code from your authenticator app</div>
          <form onSubmit={handleTotp}>
            <input className="login-input" type="text" inputMode="numeric" pattern="[0-9]{6}" placeholder="000000" value={mfaCode} onChange={e=>setMfaCode(e.target.value.replace(/\D/g,''))} required maxLength={6} autoFocus />
            <button className="login-btn" type="submit" disabled={loading||mfaCode.length!==6}>{loading ? 'Verifying...' : 'Verify'}</button>
          </form>
          {err && <div className="login-err">{err}</div>}
        </div>
      </div>
    );
  }

  if (stage === 'mfasetup') {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-title">Set up two-factor authentication</div>
          <div className="login-sub">Scan this QR code with your authenticator app (Google Authenticator, Authy, 1Password)</div>
          <div style={{display:'flex',justifyContent:'center',margin:'1rem 0 0.75rem'}}>
            <div id="totp-qr-container" style={{background:'#fff',padding:'10px',borderRadius:'8px',display:'inline-block',lineHeight:0}}></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.6rem',margin:'0.75rem 0',color:'var(--text-3)',fontSize:'0.8rem'}}>
            <div style={{flex:1,height:'1px',background:'var(--border)'}}></div>
            <span>or enter the code manually</span>
            <div style={{flex:1,height:'1px',background:'var(--border)'}}></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem',margin:'0 0 1rem'}}>
            <div style={{flex:1,fontFamily:'var(--mono)',fontSize:'0.8rem',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'0.6rem 0.8rem',wordBreak:'break-all',letterSpacing:'0.04em'}}>{mfaSecret}</div>
            <button type="button" onClick={handleSecretCopy} style={{flexShrink:0,padding:'0.5rem 0.75rem',fontSize:'0.78rem',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-2)',cursor:'pointer',whiteSpace:'nowrap',transition:'color 0.15s'}}>{qrCopied ? 'Copied!' : 'Copy'}</button>
          </div>
          <div className="login-sub" style={{marginBottom:'0.5rem',textAlign:'left'}}>Enter the 6-digit code from your app to confirm</div>
          <form onSubmit={handleMfaSetup}>
            <input className="login-input" type="text" inputMode="numeric" pattern="[0-9]{6}" placeholder="000000" value={mfaCode} onChange={e=>setMfaCode(e.target.value.replace(/\D/g,''))} required maxLength={6} autoFocus />
            <button className="login-btn" type="submit" disabled={loading||mfaCode.length!==6}>{loading ? 'Confirming...' : 'Confirm & sign in'}</button>
          </form>
          {err && <div className="login-err">{err}</div>}
        </div>
      </div>
    );
  }

  if (stage === 'newpass') {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-title">Set new password</div>
          <div className="login-sub">Required on first sign-in</div>
          <form onSubmit={handleNewPass}>
            <input className="login-input" type="password" placeholder="New password (min 12, upper/lower/number/symbol)" value={newPass} onChange={e=>setNewPass(e.target.value)} required minLength={12} />
            <input className="login-input" type="password" placeholder="Confirm new password" value={newPass2} onChange={e=>setNewPass2(e.target.value)} required minLength={12} />
            <button className="login-btn" disabled={loading}>{loading ? 'Setting...' : 'Set password & sign in'}</button>
          </form>
          {err && <div className="login-err">{err}</div>}
        </div>
      </div>
    );
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-title">Project Neo</div>
        <div className="login-sub">Admin dashboard</div>
        <form onSubmit={handleSubmit}>
          <input className="login-input" type="text" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username" />
          <input className="login-input" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} required autoComplete="current-password" />
          <button className="login-btn" disabled={loading}>{loading ? 'Signing in...' : 'Sign in'}</button>
        </form>
        {err && <div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

      </div>

      {/* Card 3 — Failure Modes */}

        <div className="learn-sub">From trade autopsies · losing trades</div>
        {failures.length === 0
          ? <div className="empty-state">
              <div className="empty-val">—</div>
              <div className="empty-lbl">No losses yet</div>
              <div className="empty-hint">Appears after first losing trade</div>
            </div>
          : failures.map((f,i) => (
            <div key={i} className="failure-row">
              <div className="failure-header">
                <span className="failure-mode">{f.mode}</span>

function AdminPerformancePanel({ trades, onDownloadSummary, onDownloadAudit }) {
  const PRESETS = [
    { label: 'Today',        key: 'today' },
    { label: 'This week',    key: 'week' },
    { label: 'This month',   key: 'month' },
    { label: 'Last month',   key: 'last_month' },
    { label: 'Last quarter', key: 'quarter' },
    { label: 'All time',     key: 'all' },
    { label: 'Custom',       key: 'custom' },
  ];

  const [activePreset, setActivePreset] = React.useState('all');
  const [customFrom,   setCustomFrom]   = React.useState('');
  const [customTo,     setCustomTo]     = React.useState('');

  // Compute date bounds for the selected preset
  const getBounds = () => {
    const now   = new Date();
    const today = now.toISOString().slice(0, 10);
    if (activePreset === 'today')      return { from: today, to: today };
    if (activePreset === 'week') {
      const d = new Date(now); d.setDate(d.getDate() - d.getDay() + 1);
      return { from: d.toISOString().slice(0,10), to: today };
    }
    if (activePreset === 'month') {
      return { from: `${today.slice(0,7)}-01`, to: today };
    }
    if (activePreset === 'last_month') {
      const d = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const last = new Date(now.getFullYear(), now.getMonth(), 0);
      return { from: d.toISOString().slice(0,10), to: last.toISOString().slice(0,10) };
    }
    if (activePreset === 'quarter') {
      const q = Math.floor(now.getMonth() / 3);
      const qStart = new Date(now.getFullYear(), (q - 1) * 3, 1);
      const qEnd   = new Date(now.getFullYear(), q * 3, 0);
      return { from: qStart.toISOString().slice(0,10), to: qEnd.toISOString().slice(0,10) };
    }
    if (activePreset === 'custom') return { from: customFrom, to: customTo };
    return { from: null, to: null }; // all time
  };

  const { from, to } = getBounds();

  // Filter trades by date range and user
  const filtered = React.useMemo(() => {
    return (trades || []).filter(t => {
      const d = t.exit_date;
      if (!d) return false;
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
  }, [trades, from, to]);

  // Per-user metrics
  const USERS = ['neo_user_001', 'neo_user_002', 'neo_user_003'];
  const PROFILES = { neo_user_001: 'Conservative', neo_user_002: 'Balanced', neo_user_003: 'Aggressive' };

  const userMetrics = USERS.map(uid => {
    const t = filtered.filter(x => x.user === uid);
    const closed  = t.filter(x => x.pnl != null);
    const wins    = closed.filter(x => x.pnl > 0);
    const losses  = closed.filter(x => x.pnl < 0);
    const pnl     = closed.reduce((s, x) => s + x.pnl, 0);
    const avgWin  = wins.length   ? wins.reduce((s,x)=>s+x.pnl,0)  / wins.length  : 0;
    const avgLoss = losses.length ? losses.reduce((s,x)=>s+x.pnl,0)/ losses.length: 0;
    const pf      = losses.length && Math.abs(losses.reduce((s,x)=>s+x.pnl,0)) > 0
                    ? (wins.reduce((s,x)=>s+x.pnl,0) / Math.abs(losses.reduce((s,x)=>s+x.pnl,0))).toFixed(2)
                    : wins.length ? '∞' : '—';
    return { uid, profile: PROFILES[uid], trades: closed.length, wins: wins.length,
             losses: losses.length, pnl, avgWin, avgLoss, winRate: closed.length ? wins.length/closed.length*100 : 0, pf };
  });

  const totals = {
    trades:  userMetrics.reduce((s,u)=>s+u.trades,0),
    wins:    userMetrics.reduce((s,u)=>s+u.wins,0),
    losses:  userMetrics.reduce((s,u)=>s+u.losses,0),
    pnl:     userMetrics.reduce((s,u)=>s+u.pnl,0),
    avgWin:  userMetrics.filter(u=>u.wins>0).length
               ? userMetrics.reduce((s,u)=>s+(u.avgWin*u.wins),0) / userMetrics.reduce((s,u)=>s+u.wins,0)
               : 0,
    avgLoss: userMetrics.filter(u=>u.losses>0).length
               ? userMetrics.reduce((s,u)=>s+(u.avgLoss*u.losses),0) / userMetrics.reduce((s,u)=>s+u.losses,0)
               : 0,
  };
  totals.winRate = totals.trades ? totals.wins / totals.trades * 100 : 0;
  const totalGross = userMetrics.reduce((s,u)=>s+(u.wins>0?u.wins*u.avgWin:0),0);
  const totalLoss  = Math.abs(userMetrics.reduce((s,u)=>s+(u.losses>0?u.losses*u.avgLoss:0),0));
  totals.pf = totalLoss > 0 ? (totalGross / totalLoss).toFixed(2) : totalGross > 0 ? '∞' : '—';

  const fmt = v => `${v >= 0 ? '+' : '-'}£${Math.abs(v).toFixed(2)}`;
  const profileClass = p => p === 'Conservative' ? 'profile-conservative' : p === 'Balanced' ? 'profile-balanced' : 'profile-aggressive';

  // Recent filtered trades (all users, newest first)
  const recentTrades = [...filtered].sort((a,b) => b.exit_date.localeCompare(a.exit_date) || b.exit_time.localeCompare(a.exit_time)).slice(0, 20);

  return (
    <>
      {/* Section header */}
      <div className="sec-header">
        <div className="sec-label" style={{marginBottom:0}}>Performance</div>
        <div className="dl-group">
          <button className="dl-btn" onClick={onDownloadSummary}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5.5l3 3 3-3M1 10h10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Trade summary CSV
          </button>
          <button className="dl-btn-primary" onClick={onDownloadAudit}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5.5l3 3 3-3M1 10h10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Full decision audit CSV
          </button>
        </div>
      </div>

      {/* Period selector */}
      <div className="card" style={{marginBottom:'1.25rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.6rem',flexWrap:'wrap'}}>
          <div className="perf-presets">
            {PRESETS.map(p => (
              <button key={p.key} className={`preset-btn${activePreset===p.key?' active':''}`}
                onClick={() => setActivePreset(p.key)}>{p.label}</button>
            ))}
          </div>
          {activePreset === 'custom' && (
            <div style={{display:'flex',alignItems:'center',gap:'0.4rem',marginLeft:'0.25rem'}}>
              <input type="date" className="date-input" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} />
              <span className="date-sep">→</span>
              <input type="date" className="date-input" value={customTo}   onChange={e=>setCustomTo(e.target.value)} />
            </div>
          )}
        </div>

        {/* Aggregate headline metrics */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,minmax(0,1fr))',gap:'0.6rem',marginTop:'0.85rem'}}>
          {[
            { lbl:'Total P&L',     val: fmt(totals.pnl),                    color: totals.pnl >= 0 ? 'var(--green)' : 'var(--red)' },
            { lbl:'Total trades',  val: totals.trades,                      color: 'var(--text-1)' },

function KillSwitchBar({ system, onActivate, onDeactivate }) {
  const active = system?.kill_switch_active || false;
  const reason = system?.kill_switch_reason || '';
  const activatedAt = system?.kill_switch_activated_at;
  const resumingUntil = system?.kill_switch_resuming_until;
  const isResuming = resumingUntil && new Date() < new Date(resumingUntil);
  const elapsed = activatedAt && active ? Math.floor((Date.now() - new Date(activatedAt).getTime()) / 60000) + 'm' : '';
  const cls = active ? 'ks-bar ks-active' : isResuming ? 'ks-bar ks-resuming' : 'ks-bar';
  return (
    <div className={cls}>
      <div className="ks-left">
        <div className="ks-dot" />
        <span className="ks-label">{active ? 'Kill Switch: ACTIVE' : isResuming ? 'Kill Switch: Inactive (Resuming)' : 'Kill Switch: Inactive'}</span>
        {active && elapsed && <span className="ks-meta">Active for {elapsed} · {reason || 'Manual'}</span>}
        {isResuming && <span className="ks-meta">Monitoring closely — auto-clears after 4 cycles</span>}
      </div>
      <div>
        {active ? <button className="ks-btn ks-btn-deactivate" onClick={onDeactivate}>Deactivate</button>
                : <button className="ks-btn ks-btn-activate" onClick={onActivate}>Kill Switch</button>}
      </div>
    </div>
  );
}

function OTPInput({ onComplete }) {
  const [digits, setDigits] = useState(['','','','','','']);
  const refs = [React.useRef(),React.useRef(),React.useRef(),React.useRef(),React.useRef(),React.useRef()];
  const handleChange = (idx, val) => {
    if (!/^\d?$/.test(val)) return;
    const next = [...digits]; next[idx] = val; setDigits(next);
    if (val && idx < 5) refs[idx+1].current?.focus();
    if (next.every(d => d.length === 1)) onComplete(next.join(''));
  };
  const handleKey = (idx, e) => { if (e.key === 'Backspace' && !digits[idx] && idx > 0) refs[idx-1].current?.focus(); };
  return (
    <div className="ks-otp-group">
      {digits.map((d,i) => <input key={i} ref={refs[i]} className="ks-otp-digit" maxLength={1} value={d} onChange={e=>handleChange(i,e.target.value)} onKeyDown={e=>handleKey(i,e)} />)}
    </div>
  );
}

    setSending(true); setApiError(null);

        t.slippage_pips ?? '', t.fill_time_ms ?? '', t.slippage_action ?? '', t.partial_fill_action ?? ''
      ].join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=filename; a.click(); return;
    }
    try {
      const res = await fetch(`${CONFIG.API_BASE}${endpoint}`, { headers: {'Authorization':`Bearer ${getToken()}`} });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
    } catch(e) { alert('Download failed'); }
  };

  const { stats, agents, convergence, signals, signals_full, currency_strength, portfolio_exposure, learning, health, providers, trades, audit, alerts, system, drawdown } = data;

  const _regimeSig = (signals_full || []).find(s => s.agent_name === 'regime' && !s.pair);
  const _sessCtx = _regimeSig?.payload?.session_context || {};
  // Wall-clock guard: FX market closed Fri ≥21:00 UTC → Sun 22:00 UTC.
  // Prevents stale regime signals (written before market open) from keeping the overlay active.
  // Updates every 60s so overlay lifts automatically at market open.
  const [_clockTick, _setClockTick] = React.useState(new Date());
  React.useEffect(() => {
    const _timer = setInterval(() => _setClockTick(new Date()), 60000);
    return () => clearInterval(_timer);
  }, []);
  const _utcNow = _clockTick;
  const _utcDay = _utcNow.getUTCDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat
  const _utcHr  = _utcNow.getUTCHours();
  const _fxActuallyClosed = (_utcDay === 6) || (_utcDay === 0 && _utcHr < 22) || (_utcDay === 5 && _utcHr >= 21);
  const isWeekendClosed = _fxActuallyClosed;
  const _weekday = _utcDay >= 1 && _utcDay <= 5;
  const _offHours = _utcHr >= 22 || _utcHr < 7;
  const isWeekdayOffHours = _weekday && _offHours;
  const isMarketClosed = isWeekendClosed || isWeekdayOffHours;

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <span className="wordmark">Project Neo</span>
          <span className="admin-pill">Admin</span>
        </div>
        <div className="topbar-right">
          <Clock />
          <button className="theme-toggle" onClick={toggleTheme} title="Toggle dark mode">{darkMode ? '☀︎' : '☾'}</button>
          <button className="logout-btn" onClick={onLogout}>{getUser()} · Sign out</button>
        </div>
      </div>

      {/* Tab navigation */}
      <div className="tab-nav">
        <button className={`tab-btn ${activeTab==='overview'?'active':''}`} onClick={()=>setActiveTab('overview')}>Overview</button>
        <button className={`tab-btn ${activeTab==='observation'?'active':''}`} onClick={()=>setActiveTab('observation')}>Agent Observation</button>
        <button className={`tab-btn ${activeTab==='health'?'active':''}`} onClick={()=>setActiveTab('health')}>System Health</button>
        <button className={`tab-btn ${activeTab==='trades'?'active':''}`} onClick={()=>setActiveTab('trades')}>Trades</button>
        <button className={`tab-btn ${activeTab==='audit'?'active':''}`} onClick={()=>setActiveTab('audit')}>Audit Log</button>
        <button className={`tab-btn ${activeTab==='capital'?'active':''}`} onClick={()=>setActiveTab('capital')}>Capital</button>
        <button className={`tab-btn ${activeTab==='equity'?'active':''}`} onClick={()=>setActiveTab('equity')}>Equity</button>
        <button className={`tab-btn ${activeTab==='proposals'?'active':''}`} onClick={()=>setActiveTab('proposals')}>
          Proposals{proposals.pending_count > 0 && <span className="pending-badge">{proposals.pending_count}</span>}
        </button>
      </div>

      {/* Kill Switch State Bar */}
      <KillSwitchBar system={system} onActivate={()=>setKsModal('activate')} onDeactivate={()=>setKsModal('deactivate')} />

      {/* Kill Switch Modals */}
      {ksModal === 'activate' && <ActivateModal system={system} onClose={()=>setKsModal(null)} onConfirm={handleKsActivate} />}
      {ksModal === 'deactivate' && <DeactivateModal system={system} onClose={()=>setKsModal(null)} onConfirm={handleKsDeactivate} />}

      {activeTab === 'overview' && (<>
      {/* System stats */}
      <div className="grid-4" style={{marginBottom:'1.25rem'}}>
        <div className="stat-card stat-card-cycle"><div className="lbl">Cycle count</div><div className="val">{stats ? stats.cycle_count.toLocaleString() : '—'}</div><div className="sub">since session start</div></div>
        <div className="stat-card stat-card-trades"><div className="lbl">Trades today</div><div className="val">{stats ? stats.trades_today : '—'}</div><div className="sub">incl. open positions</div></div>
        <div className="stat-card stat-card-signals"><div className="lbl">Signals generated</div><div className="val">{stats ? stats.signals_generated : '—'}</div><div className="sub">last 15 min</div></div>
        <div className="stat-card stat-card-regime"><div className="lbl">Current regime</div><div className="val" style={{fontSize:'0.9rem',paddingTop:3}}>{stats ? stats.regime : '—'}</div><div className="sub">{stats ? stats.session : '—'} session</div></div>
      </div>

      {/* System state bar */}
      {system && (system.kill_switch_active || system.circuit_breakers_active > 0 || system.degraded_agents) && (
        <div className={`sys-bar ${system.kill_switch_active ? 'critical' : system.circuit_breakers_active > 0 ? 'critical' : 'warning'}`}>
          <svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M6 1L1 11h10L6 1z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/><path d="M6 5v2.5M6 9h.01" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
          {system.kill_switch_active
            ? 'SYSTEM KILL SWITCH ACTIVE — all trading halted'
            : system.circuit_breakers_active > 0
            ? `CIRCUIT BREAKER: ${system.circuit_breakers_active} user(s) halted${system.halted_users ? ' — ' + system.halted_users : ''} · Losers closed, winners tightened to breakeven · Manual reset required`
            : `Agent degradation: ${system.degraded_agents} — trading continues with adjusted thresholds`
          }
        </div>
      )}

      {/* Alerts — always visible, collapsible */}
      {(() => {
        const active = (alerts || []).filter(a => !a.acknowledged);
        const critCount = active.filter(a => a.severity === 'critical').length;
        const highCount = active.filter(a => a.severity === 'high').length;
        const medCount = active.filter(a => a.severity === 'medium').length;
        const hasAlerts = active.length > 0;
        const summaryParts = [];
        if (critCount) summaryParts.push(`${critCount} critical`);
        if (highCount) summaryParts.push(`${highCount} high`);
        if (medCount) summaryParts.push(`${medCount} medium`);
        return (
          <div className="card" style={{marginBottom:'1.25rem', borderColor: critCount ? 'rgba(155,34,38,0.25)' : hasAlerts ? 'rgba(133,77,14,0.15)' : 'var(--border)'}}>
            <div
              onClick={() => hasAlerts && setAlertsExpanded(e => !e)}
              style={{display:'flex', alignItems:'center', justifyContent:'space-between', cursor: hasAlerts ? 'pointer' : 'default', userSelect:'none'}}
            >
              <div style={{display:'flex', alignItems:'center', gap:'0.6rem'}}>
                <div className={`dot ${critCount ? 'dot-red' : hasAlerts ? 'dot-amber' : 'dot-green'}`} />
                <span style={{fontSize:'0.78rem', fontWeight:500}}>
                  {hasAlerts
                    ? `${active.length} active alert${active.length > 1 ? 's' : ''}`
                    : 'No active alerts'
                  }
                </span>
                {hasAlerts && (
                  <span style={{fontSize:'0.68rem', color:'var(--text-3)'}}>
                    ({summaryParts.join(', ')})
                  </span>
                )}
              </div>
              {hasAlerts && (
                <div style={{display:'flex', alignItems:'center', gap:'0.5rem'}}>
                  <button
                    onClick={e => {
                      e.stopPropagation();
                      apiPost('/alerts/acknowledge', {all: true}).then(() => {
                        setData(d => ({...d, alerts: (d.alerts || []).map(a => ({...a, acknowledged: true}))}));
                        setAlertsExpanded(false);
                      }).catch(() => {});
                    }}
                    style={{fontSize:'0.65rem', padding:'2px 8px', cursor:'pointer', background:'var(--text-3)', color:'var(--bg)', border:'none', borderRadius:'3px', opacity:0.75}}
                  >Dismiss all</button>
                  <span style={{fontSize:'0.6rem', color:'var(--text-3)', transition:'transform 0.18s', transform: alertsExpanded ? 'rotate(180deg)' : 'rotate(0deg)'}}>▼</span>
                </div>
              )}
            </div>
            {alertsExpanded && hasAlerts && (
              <div style={{marginTop:'0.75rem', paddingTop:'0.75rem', borderTop:'1px solid var(--border)'}}>
                {active.map((a,i) => (
                  <div key={i} className="alert-item">
                    <div className={`alert-dot ${a.severity}`} />
                    <div style={{flex:1}}>
                      <div style={{marginBottom:'3px'}}><span className={`alert-badge ${a.severity}`}>{a.alert_type.replace(/_/g,' ')}</span></div>
                      <div className="alert-title">{a.title}</div>
                      <div className="alert-detail">{a.detail}</div>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:'0.5rem', flexShrink:0}}>
                      <div className="alert-time">{a.minutes_ago < 1 ? 'just now' : `${Math.round(a.minutes_ago)}m ago`}</div>
                      <button
                        onClick={e => {
                          e.stopPropagation();
                          apiPost('/alerts/acknowledge', {ids: [a.id]}).then(() => {
                            setData(d => ({...d, alerts: (d.alerts || []).map(x => x.id === a.id ? {...x, acknowledged: true} : x)}));
                          }).catch(() => {});
                        }}
                        style={{fontSize:'0.6rem', padding:'2px 6px', cursor:'pointer', background:'none', color:'var(--text-3)', border:'1px solid var(--border)', borderRadius:'3px'}}
                      >Dismiss</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* ROW 4 — Convergence + Currency Strength + Learning Module */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'16px',marginBottom:'1.25rem',alignItems:'start'}}>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">Convergence scores</div>
          <div className="card" style={{position:'relative'}}>
            <div className={isMarketClosed ? "conv-closed-wrap" : undefined}>
              <div className={isMarketClosed ? "conv-closed-scores" : undefined}>
                {(convergence || []).map((c,i) => <ConvBar key={i} pair={c.pair} score={c.score} />)}
                {!convergence && <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>Loading…</div>}
                {convergence && convergence.length === 0 && <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>No signals yet — waiting for agent cycle</div>}
              </div>
              {isMarketClosed && (
                <div className="conv-closed-overlay">
                  <span className="conv-closed-label">MARKET CLOSED</span>
                  <span className="conv-closed-sub">{isWeekendClosed ? "Opens: Sunday 22:00 UTC" : "Opens: 07:00 UTC"}</span>
                  <span className="conv-closed-sub">Last active session</span>
                </div>
              )}
            </div>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">Currency strength</div>
          <div className="card">
            <CurrencyStrengthPanel currency_strength={currency_strength} />
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">Learning module</div>
          {learning
            ? <LearningModule learning={learning} />
            : <div className="card" style={{flex:1,textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>Loading…</div>
          }
        </div>
      </div>

      {/* ROW 4b — Portfolio exposure */}
      <div style={{marginBottom:'1.25rem'}}>
        <div className="sec-label">Portfolio exposure</div>
        <div className="card">
          <PortfolioExposurePanel portfolio_exposure={portfolio_exposure} />
        </div>
      </div>

      {/* ROW 5 — Latest signals — 3 columns by pair tier */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'16px',marginBottom:'1.25rem',alignItems:'stretch'}}>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">USD Pairs</div>
          <div className="card" style={{flex:1, height:'100%'}}>
            <SignalsPanel signals_full={signals_full} pairGroup={['EURUSD','GBPUSD','USDJPY','USDCHF','AUDUSD','USDCAD','NZDUSD']} />
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">Cross Pairs — Tier 1 & 2</div>
          <div className="card" style={{flex:1, height:'100%'}}>
            <SignalsPanel signals_full={signals_full} pairGroup={['EURGBP','EURJPY','GBPJPY','EURCHF','GBPCHF','EURAUD','GBPAUD','EURCAD','GBPCAD']} />
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div className="sec-label">Cross Pairs — Tier 3</div>
          <div className="card" style={{flex:1, height:'100%'}}>
            <SignalsPanel signals_full={signals_full} pairGroup={['AUDNZD','AUDJPY','CADJPY','NZDJPY']} />
          </div>
        </div>
      </div>

      {/* ROW 6 + 7 — Market regime */}
      {(() => {
        const regSig = (signals_full || []).find(s => s.agent_name === 'regime' && !s.pair);
        if (!regSig) return null;
        const p = regSig.payload || {};
        const stress = p.system_stress_score ?? 0;
        const stressState = (p.stress_state || 'normal').replace(/_/g,' ');
        const stressConf = p.stress_score_confidence || '';
        const pairRegimes = p.regime_per_pair || {};
        const components = p.stress_components || {};
        const sessCtx = p.session_context || {};
        const killSwitch = p.kill_switch_active || false;
        const stressColor = stress >= 70 ? 'var(--red)' : stress >= 50 ? 'var(--amber)' : stress >= 30 ? 'var(--amber)' : 'var(--green)';
        const stressBg    = stress >= 70 ? 'var(--red-bg)' : stress >= 30 ? 'var(--amber-bg)' : 'var(--green-bg)';
        const COMP_META = {
          vix_level_trend:        { label:'VIX',              hint:null },
          cross_asset_risk:       { label:'Cross-Asset Risk', hint:'Equity/credit/commodity stress index. Neutral when no cross-asset data available.' },
          cot_extremes:           { label:'COT Extremes',     hint:'Weekly CFTC data. High score = crowded positioning.' },
          yield_curve_slope:      { label:'Yield Curve',      hint:null },
          realised_vol_divergence:{ label:'Realised Vol',     hint:null },
          order_flow_anomaly:     { label:'Order Flow',       hint:null },
          correlation_breakdown:  { label:'Correlation',      hint:'Requires live trade history. Populates after first trades execute.' },
          geopolitical_index:     { label:'Geopolitical',     hint:'GDELT disabled (persistent 429s). Fixed neutral value (50) in use. NewsAPI.ai replacement pending.' },
        };
        const sessionLabel = sessCtx.session === 'off_hours'
          ? (sessCtx.day_of_week >= 5 ? 'Weekend — market closed' : 'Off hours')
          : (sessCtx.session || '').replace(/_/g,' ');

        const renderPairRow = (pair) => {
          const pr = pairRegimes[pair] || {};
          const regime = pr.regime || 'unknown';
          const adx = pr.adx != null ? Number(pr.adx).toFixed(1) : '—';
          const conf = pr.regime_confidence || '';
          const isTrending = regime === 'trending';
          const isHighVol  = regime === 'high_volatility';
          const isLowVol   = regime === 'low_volatility';
          const isRanging  = regime === 'ranging';
          const regimeBg    = isTrending ? 'var(--blue-bg)' : isHighVol ? 'var(--red-bg)' : isLowVol ? 'var(--green-bg)' : isRanging ? 'rgba(100,116,139,0.10)' : 'var(--surface-2)';
          const regimeColor = isTrending ? 'var(--blue)'    : isHighVol ? 'var(--red)'    : isLowVol ? 'var(--green)'   : isRanging ? '#64748b' : 'var(--text-3)';
          const confColor = conf === 'high' ? 'var(--green)' : 'var(--text-3)';
          return (
            <div key={pair} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <span title={`Regime confidence: ${conf}`} style={{width:'5px',height:'5px',borderRadius:'50%',background:confColor,flexShrink:0,display:'inline-block'}}></span>
                <span style={{fontFamily:'var(--mono)',fontSize:'0.78rem',color:'var(--text-2)',letterSpacing:'0.02em'}}>{pair.slice(0,3)}/{pair.slice(3)}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                <span style={{fontSize:'0.65rem',padding:'1px 7px',borderRadius:'6px',fontWeight:500,background:regimeBg,color:regimeColor,textTransform:'capitalize'}}>
                  {regime.replace(/_/g,' ')}
                </span>
                <span style={{fontFamily:'var(--mono)',fontSize:'0.7rem',color:'var(--text-3)',minWidth:'52px',textAlign:'right'}}>ADX {adx}</span>
              </div>
            </div>
          );
        };

        return (
          <div>
            {/* Stress score header — full width above regime boxes */}
            <div className="sec-label">Market regime</div>
            <div className="card" style={{marginBottom:'12px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.6rem'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:'1.35rem',fontWeight:500,color:stressColor,lineHeight:1}}>{stress.toFixed(1)}</span>
                  <div>
                    <div style={{fontSize:'0.78rem',fontWeight:500,color:stressColor,textTransform:'capitalize'}}>{stressState} stress · {stressConf} confidence</div>
                    <div style={{fontSize:'0.65rem',color:'var(--text-3)',textTransform:'capitalize'}}>{sessionLabel}{p.convergence_boost > 0 ? ` · +${(p.convergence_boost*100).toFixed(0)}% convergence boost` : ''}</div>
                  </div>
                  {killSwitch && <span style={{fontSize:'0.62rem',background:'var(--red-bg)',color:'var(--red)',padding:'2px 8px',borderRadius:'8px',fontWeight:500,marginLeft:4}}>KILL SWITCH ACTIVE</span>}
                </div>
                <span style={{fontSize:'0.68rem',padding:'2px 8px',borderRadius:'8px',fontWeight:500,background:stressBg,color:stressColor,textTransform:'capitalize'}}>{stressState}</span>
              </div>
              <div style={{height:'5px',background:'var(--surface-2)',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{width:`${Math.min(stress,100)}%`,height:'100%',background:stressColor,borderRadius:'3px',transition:'width 0.4s ease'}}></div>
              </div>
            </div>

            {/* ROW 7 — Stress components — horizontal card grid */}
            <div className="card" style={{marginBottom:'1.25rem'}}>
              <div style={{fontSize:'0.65rem',fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:'0.75rem'}}>
                Stress components <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>(bars = weighted contribution)</span>
              </div>
              <div className="stress-comp-grid" style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'10px'}}>
                {Object.entries(COMP_META).map(([key, meta]) => {
                  const comp = components[key] || {};
                  const score = comp.normalised_score != null ? Number(comp.normalised_score) : null;
                  const weight = comp.weight != null ? Number(comp.weight) : 0;
                  const isSubstituted = comp.source === 'substituted';
                  const weightedContrib = score != null ? score * weight : 0;
                  const barPct = Math.min(weightedContrib, 100);
                  const barColor = weightedContrib >= 15 ? 'var(--red)' : weightedContrib >= 7 ? 'var(--amber)' : 'var(--green)';
                  return (
                    <div key={key} style={{background:'var(--surface-2)',borderRadius:'var(--radius-sm)',padding:'0.55rem 0.7rem'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                        <span style={{fontSize:'0.68rem',fontWeight:500,color:isSubstituted?'var(--text-3)':'var(--text-2)'}} title={meta.hint||''}>{meta.label}</span>
                        <span style={{fontSize:'0.6rem',color:'var(--text-3)'}}>{Math.round(weight*100)}%</span>
                      </div>
                      <div style={{height:'3px',background:'var(--border)',borderRadius:'2px',overflow:'hidden',marginBottom:'5px'}}>
                        {!isSubstituted && score != null
                          ? <div style={{width:`${barPct}%`,height:'100%',background:barColor,borderRadius:'2px'}}></div>
                          : <div style={{width:'100%',height:'100%',background:'repeating-linear-gradient(90deg,var(--border) 0px,var(--border) 3px,transparent 3px,transparent 6px)',borderRadius:'2px'}}></div>
                        }
                      </div>
                      {isSubstituted
                        ? <span style={{fontSize:'0.6rem',color:'var(--text-3)',fontStyle:'italic'}} title={meta.hint||''}>no data</span>
                        : <span style={{fontFamily:'var(--mono)',fontSize:'0.7rem',color:'var(--text-1)'}}>{score != null ? score.toFixed(0) : '—'}</span>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      </>)}

      {/* ── SYSTEM HEALTH TAB ── */}
      {activeTab === 'health' && (<>

      {/* Agent status */}
      <div className="sec-label">Agent status</div>
      <div className="card">
        {!agents && <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>Loading…</div>}
        {(agents || []).map((a,i) => (
          <div key={i} className="agent-row">
            <div>
              <div className="agent-name" style={{display:'flex',alignItems:'center',gap:'6px'}}>
                {a.name}
                {a.degradation_mode === 'degraded' && <span style={{fontSize:'0.62rem',background:'var(--amber-bg)',color:'var(--amber)',padding:'1px 6px',borderRadius:'8px',fontWeight:500}}>degraded</span>}
                {a.degradation_mode === 'halted' && <span style={{fontSize:'0.62rem',background:'var(--red-bg)',color:'var(--red)',padding:'1px 6px',borderRadius:'8px',fontWeight:500}}>HALTED</span>}
              </div>
              <div className="agent-meta">Cycle {a.cycle} · Last seen {a.last_seen} · {a.errors} errors · Session: {a.session_id}
                {a.absent_cycles > 0 && ` · ${a.absent_cycles} cycle(s) absent`}
              </div>
            </div>
            <div className="agent-right">
              <span className="cycle-lbl">15m cycle</span>
              <StatusDot status={a.status} />
            </div>
          </div>
        ))}
      </div>

      {/* API health */}
      <div className="sec-label">API health</div>
      <div className="card">
        <div className="api-grid">
          {!health && <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text-3)',fontSize:'0.82rem'}}>Loading…</div>}
          {(health || []).map((h,i) => (
            <div key={i} className="api-item" style={{alignItems:'flex-start',paddingBottom:'0.1rem'}}>
              <div style={{marginTop:'3px'}}><ApiDot status={h.status} /></div>
              <div style={{minWidth:0}}>
                <div className="api-name" style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>
                  {h.name}
                  <ApiTypeBadge type={h.type} />
                  {h.status === 'unknown' && (
                    <span style={{fontSize:'0.55rem',background:'rgba(100,116,139,0.1)',color:'var(--text-3)',padding:'1px 4px',borderRadius:'3px'}}>PENDING</span>
                  )}
                </div>
                <div className="api-detail" style={{marginTop:'1px'}}>
                  {h.errors} err · 1h
